# Cloudflare Tunnel — ingress configuration reference
#
# This documents what is configured in the Cloudflare Zero Trust dashboard.
# With token-based auth, cloudflared does NOT read a local config.yml —
# all ingress rules live in the dashboard under:
#   Networks → Tunnels → coastal-nas → Published application routes
#
# To rebuild: re-enter these routes in the dashboard after creating/recreating the tunnel.
#
# Tunnel name:  coastal-nas
# Tunnel ID:    6e0fe91a-d68e-446e-a5e0-c636bb535b44

ingress:
  - hostname: nas.coastaltravelcompany.com
    path: "*"
    service: https://192.168.68.2:5001  # Synology DSM HTTPS; LAN IP of the NAS
    originRequest:
      noTLSVerify: true                  # NAS uses a self-signed certificate

  - service: http_status:404             # catch-all
