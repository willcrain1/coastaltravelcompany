# Docker services running on the Synology NAS
# Deploy: SSH into NAS → cd to this directory → docker compose up -d
#
# To export your current live config from Synology Container Manager:
#   Container Manager → Project → select project → Action → Export
# That downloads a docker-compose.yml you can use to replace/update this file.

services:

  cloudflared:
    image: cloudflare/cloudflared:latest
    container_name: cloudflared
    restart: unless-stopped
    command: tunnel --config /etc/cloudflared/config.yml run
    volumes:
      - ./cloudflare-tunnel/config.yml:/etc/cloudflared/config.yml:ro
      - ./cloudflare-tunnel/credentials.json:/etc/cloudflared/credentials.json:ro
    network_mode: host

  # ── Add other NAS services below ──────────────────────────────────────────
  # Replace these placeholders with your actual containers exported from
  # Container Manager (see export instructions above).
