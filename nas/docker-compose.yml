# Docker services running on the Synology NAS
# Deploy: copy nas/ to the NAS, create .env from .env.example, then run:
#   docker compose up -d

services:
  cloudflared:
    image: cloudflare/cloudflared:latest
    container_name: cloudflare-cloudflared-1
    restart: unless-stopped
    command: tunnel --no-autoupdate run --token ${TUNNEL_TOKEN}
    network_mode: bridge
