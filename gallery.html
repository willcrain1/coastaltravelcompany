<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Gallery — Coastal Travel Company</title>
  <meta name="robots" content="noindex, nofollow" />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Gilda+Display&family=Pinyon+Script&family=Montserrat:wght@300;400;500&display=swap" rel="stylesheet" />
  <style>
    *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }

    html, body {
      height: 100%;
      overflow: hidden;
      background: #1C1C1C;
      font-family: 'Montserrat', sans-serif;
    }

    /* ── Loading screen (shown while iframe initialises) ── */
    #loader {
      position: fixed;
      inset: 0;
      background: #1C1C1C;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: 0;
      z-index: 10;
      transition: opacity 0.5s ease;
    }
    #loader.hide { opacity: 0; pointer-events: none; }

    .l-main {
      font-family: 'Gilda Display', serif;
      font-size: 13px;
      letter-spacing: 0.24em;
      text-transform: uppercase;
      color: rgba(255,255,255,0.4);
    }
    .l-script {
      font-family: 'Pinyon Script', cursive;
      font-size: 52px;
      color: #8FBFBE;
      line-height: 1.1;
    }
    .l-spinner {
      margin-top: 36px;
      width: 28px;
      height: 28px;
      border: 1.5px solid rgba(255,255,255,0.08);
      border-top-color: #8FBFBE;
      border-radius: 50%;
      animation: spin 0.8s linear infinite;
    }
    @keyframes spin { to { transform: rotate(360deg); } }

    /* ── Error screen ── */
    #error {
      display: none;
      position: fixed;
      inset: 0;
      background: #1C1C1C;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      text-align: center;
      padding: 40px;
      color: rgba(255,255,255,0.7);
    }
    #error.show { display: flex; }
    #error .e-script {
      font-family: 'Pinyon Script', cursive;
      font-size: 44px;
      color: #8FBFBE;
      display: block;
      margin-bottom: 16px;
    }
    #error h2 {
      font-family: 'Gilda Display', serif;
      font-size: 24px;
      color: #fff;
      margin-bottom: 12px;
      font-weight: 400;
    }
    #error p {
      font-size: 13px;
      font-weight: 300;
      color: rgba(255,255,255,0.4);
      max-width: 380px;
      line-height: 1.75;
    }
    #error a {
      display: inline-block;
      margin-top: 32px;
      padding: 12px 32px;
      background: #2A5C45;
      color: #fff;
      text-decoration: none;
      font-size: 10px;
      font-weight: 600;
      letter-spacing: 0.3em;
      text-transform: uppercase;
      transition: background 0.25s;
    }
    #error a:hover { background: #8FBFBE; color: #000; }

    /* ── The iframe ── */
    #frame {
      width: 100%;
      height: 100%;
      border: none;
      display: block;
    }
  </style>
</head>
<body>

  <!-- Loading splash -->
  <div id="loader">
    <span class="l-main">Coastal</span>
    <span class="l-script">Travel Company</span>
    <div class="l-spinner"></div>
  </div>

  <!-- Error state -->
  <div id="error">
    <span class="e-script">oops.</span>
    <h2>Gallery Not Found</h2>
    <p>This link appears to be invalid or expired. Please contact us and we'll send you a fresh link.</p>
    <a href="index.html">Return Home</a>
  </div>

  <!-- Gallery iframe -->
  <iframe id="frame" src="about:blank" allowfullscreen
    sandbox="allow-scripts allow-same-origin allow-forms allow-downloads allow-popups">
  </iframe>

  <script>
    const hash = location.hash; // e.g. #eyJuYXMi...

    function showError() {
      document.getElementById('loader').style.display = 'none';
      document.getElementById('error').classList.add('show');
    }

    if (!hash || hash.length < 10) {
      showError();
    } else {
      try {
        // Decode config to pull out the NAS client gallery URL
        const config = JSON.parse(decodeURIComponent(escape(atob(hash.slice(1)))));

        if (!config.nasClientUrl && !config.nasUrl) {
          showError();
        } else {
          // nasClientUrl is set explicitly by the admin, or we fall back to the default path
          const clientUrl = config.nasClientUrl
            || (config.nasUrl + '/galleries/client-gallery.html');

          // Set the page title so the browser tab shows the event name
          if (config.eventName) {
            document.title = config.eventName + ' — Coastal Travel Company';
          }

          const frame = document.getElementById('frame');

          // Pass the exact same hash to the iframe — client-gallery.html reads it natively
          frame.src = clientUrl + hash;

          // Hide the loader once the iframe has started loading
          frame.addEventListener('load', () => {
            document.getElementById('loader').classList.add('hide');
            setTimeout(() => document.getElementById('loader').style.display = 'none', 550);
          }, { once: true });

          // Safety fallback — hide loader after 8s regardless
          setTimeout(() => {
            document.getElementById('loader').classList.add('hide');
          }, 8000);
        }
      } catch(e) {
        showError();
      }
    }
  </script>
</body>
</html>
