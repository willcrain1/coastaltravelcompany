<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>My Galleries — Coastal Travel Company</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Gilda+Display&family=Pinyon+Script&family=Montserrat:wght@300;400;500;600&display=swap" rel="stylesheet" />
  <script src="config.js"></script>
  <style>
    :root {
      --black:  #1C1C1C;
      --green:  #2A5C45;
      --teal:   #8FBFBE;
      --cream:  #F4F1EC;
      --linen:  #E8DDD0;
      --text:   #2C2C2C;
      --mid:    #5A5A5A;
      --light:  #8A8A8A;
    }
    *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      font-family: 'Montserrat', sans-serif;
      font-weight: 300;
      background: var(--cream);
      color: var(--text);
      min-height: 100vh;
      -webkit-font-smoothing: antialiased;
    }

    /* ── Nav ── */
    nav {
      position: fixed; top: 0; left: 0; right: 0; z-index: 100;
      background: var(--cream);
      border-bottom: 1px solid var(--linen);
      padding: 18px 48px;
      display: flex;
      align-items: center;
      justify-content: space-between;
    }
    .logo-wrap { line-height: 1; }
    .logo-main {
      display: block;
      font-family: 'Gilda Display', serif;
      font-size: 11px;
      letter-spacing: 0.28em;
      text-transform: uppercase;
      color: var(--black);
    }
    .logo-script {
      font-family: 'Pinyon Script', cursive;
      font-size: 26px;
      color: var(--green);
      line-height: 1;
    }
    .nav-right {
      display: flex;
      align-items: center;
      gap: 20px;
    }
    .user-email {
      font-size: 11px;
      color: var(--mid);
      letter-spacing: 0.04em;
    }
    .sign-out-btn {
      font-family: 'Montserrat', sans-serif;
      font-size: 9px;
      font-weight: 600;
      letter-spacing: 0.28em;
      text-transform: uppercase;
      background: transparent;
      border: 1px solid var(--linen);
      color: var(--mid);
      padding: 8px 16px;
      cursor: pointer;
      transition: all 0.2s;
    }
    .sign-out-btn:hover { border-color: var(--teal); color: var(--green); }

    /* ── Main ── */
    main {
      max-width: 960px;
      margin: 0 auto;
      padding: 120px 48px 80px;
    }

    .page-header { margin-bottom: 48px; }
    .eyebrow {
      font-size: 9.5px;
      font-weight: 600;
      letter-spacing: 0.42em;
      text-transform: uppercase;
      color: var(--teal);
      margin-bottom: 12px;
    }
    .page-title {
      font-family: 'Gilda Display', serif;
      font-size: 36px;
      color: var(--black);
      font-weight: 400;
    }

    /* ── Gallery grid ── */
    .gallery-grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(280px, 1fr));
      gap: 28px;
    }

    .gallery-card {
      background: #fff;
      border: 1px solid var(--linen);
      padding: 28px 26px;
      transition: box-shadow 0.25s, border-color 0.25s;
    }
    .gallery-card:hover {
      box-shadow: 0 4px 24px rgba(0,0,0,0.09);
      border-color: var(--teal);
    }

    .card-event {
      font-family: 'Gilda Display', serif;
      font-size: 19px;
      color: var(--black);
      margin-bottom: 4px;
      line-height: 1.3;
    }
    .card-client {
      font-size: 11px;
      color: var(--mid);
      letter-spacing: 0.04em;
      margin-bottom: 16px;
    }
    .card-meta {
      font-size: 10px;
      color: var(--light);
      letter-spacing: 0.04em;
      margin-bottom: 8px;
    }
    .card-pw {
      font-size: 11px;
      font-weight: 500;
      color: var(--green);
      letter-spacing: 0.08em;
      margin-bottom: 20px;
    }
    .card-pw-label {
      font-size: 9px;
      font-weight: 600;
      letter-spacing: 0.3em;
      text-transform: uppercase;
      color: var(--light);
      margin-right: 6px;
    }
    .wm-badge {
      display: inline-block;
      font-size: 8.5px;
      font-weight: 600;
      letter-spacing: 0.2em;
      text-transform: uppercase;
      color: var(--teal);
      border: 1px solid rgba(143,191,190,0.4);
      padding: 3px 10px;
      margin-bottom: 16px;
    }

    .btn-view {
      display: block;
      width: 100%;
      padding: 12px;
      font-family: 'Montserrat', sans-serif;
      font-size: 10px;
      font-weight: 600;
      letter-spacing: 0.28em;
      text-transform: uppercase;
      text-align: center;
      text-decoration: none;
      background: var(--green);
      color: #fff;
      border: none;
      cursor: pointer;
      transition: background 0.2s;
    }
    .btn-view:hover { background: #1e4532; }

    /* ── States ── */
    .state-loading, .state-empty, .state-error {
      text-align: center;
      padding: 64px 20px;
      color: var(--light);
      font-size: 13px;
      line-height: 1.8;
    }
    .state-error { color: #dc2626; }

    .spinner {
      width: 32px; height: 32px;
      border: 2px solid var(--linen);
      border-top-color: var(--green);
      border-radius: 50%;
      animation: spin 0.7s linear infinite;
      margin: 0 auto 16px;
    }
    @keyframes spin { to { transform: rotate(360deg); } }

    @media (max-width: 640px) {
      nav { padding: 16px 20px; }
      main { padding: 100px 20px 60px; }
      .user-email { display: none; }
    }
  </style>
</head>
<body>

<nav>
  <a href="/" style="text-decoration:none">
    <div class="logo-wrap">
      <span class="logo-main">Coastal</span>
      <span class="logo-script">Travel Company</span>
    </div>
  </a>
  <div class="nav-right">
    <span class="user-email" id="userEmail"></span>
    <button class="sign-out-btn" onclick="signOut()">Sign Out</button>
  </div>
</nav>

<main>
  <div class="page-header">
    <p class="eyebrow">Client Portal</p>
    <h1 class="page-title">My Galleries</h1>
  </div>
  <div id="content">
    <div class="state-loading">
      <div class="spinner"></div>
      Loading your galleries…
    </div>
  </div>
</main>

<script>
  const WORKER_URL = CTC_CONFIG.workerUrl;

  const JWT_KEY  = 'ctc_jwt';
  const USER_KEY = 'ctc_user';

  function signOut() {
    localStorage.removeItem(JWT_KEY);
    localStorage.removeItem(USER_KEY);
    window.location.href = '/login.html';
  }

  function encode(obj) {
    return btoa(unescape(encodeURIComponent(JSON.stringify(obj))));
  }

  function buildGalleryUrl(g) {
    const config = {
      id:          g.id,
      nasClientUrl: g.nasClientUrl || CTC_CONFIG.nasClientUrl,
      proxyUrl:    g.proxyUrl || WORKER_URL,
      eventName:   g.eventName,
      clientName:  g.clientName,
      watermark:   g.watermark || false,
    };
    return CTC_CONFIG.mainSiteUrl + '#' + encode(config);
  }

  function renderGalleries(galleries) {
    const el = document.getElementById('content');
    if (!galleries.length) {
      el.innerHTML = `<div class="state-empty">
        No galleries have been assigned to your account yet.<br>
        Contact your photographer to get access.
      </div>`;
      return;
    }
    el.innerHTML = `<div class="gallery-grid">${galleries.map(renderCard).join('')}</div>`;
  }

  function renderCard(g) {
    const url     = buildGalleryUrl(g);
    const created = g.created
      ? new Date(g.created).toLocaleDateString('en-US', { year: 'numeric', month: 'long', day: 'numeric' })
      : '';
    return `
      <div class="gallery-card">
        <div class="card-event">${esc(g.eventName)}</div>
        <div class="card-client">${esc(g.clientName)}</div>
        ${g.watermark ? '<div class="wm-badge">Watermarked Preview</div>' : ''}
        ${created ? `<div class="card-meta">Delivered ${esc(created)}</div>` : ''}
        <a href="${url}" target="_blank" class="btn-view">View Gallery</a>
      </div>`;
  }

  function esc(s) {
    return String(s || '').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
  }

  async function load() {
    const token = localStorage.getItem(JWT_KEY);
    if (!token) { window.location.href = '/login.html'; return; }

    // Verify token and redirect admins to the admin panel
    const meRes = await fetch(WORKER_URL + '/auth/me', {
      headers: { 'Authorization': 'Bearer ' + token },
    }).catch(() => null);

    if (!meRes || !meRes.ok) {
      localStorage.removeItem(JWT_KEY);
      localStorage.removeItem(USER_KEY);
      window.location.href = '/login.html';
      return;
    }

    const user = await meRes.json();
    document.getElementById('userEmail').textContent = user.email;

    // Admins have a dedicated admin panel; redirect if they land here
    if (user.role === 'admin') {
      window.location.href = '/admin/gallery-admin.html';
      return;
    }

    // Fetch galleries
    const res = await fetch(WORKER_URL + '/portal/galleries', {
      headers: { 'Authorization': 'Bearer ' + token },
    }).catch(() => null);

    if (!res || !res.ok) {
      document.getElementById('content').innerHTML =
        '<div class="state-error">Could not load galleries. Please try again later.</div>';
      return;
    }

    const galleries = await res.json();
    renderGalleries(galleries);
  }

  load();
</script>
</body>
</html>
