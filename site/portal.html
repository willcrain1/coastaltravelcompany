<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>My Galleries — Coastal Travel Company</title>
  <link rel="icon" href="favicon.svg" type="image/svg+xml" />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Gilda+Display&family=Pinyon+Script&family=Montserrat:wght@300;400;500;600&display=swap" rel="stylesheet" />
  <script src="config.js"></script>
  <script src="js/cookie-consent.js"></script>
  <script src="js/ga4.js" defer></script>
  <style>
    :root {
      --black:  #1C1C1C;
      --green:  #2A5C45;
      --teal:   #8FBFBE;
      --cream:  #F4F1EC;
      --linen:  #E8DDD0;
      --text:   #2C2C2C;
      --mid:    #5A5A5A;
      --light:  #8A8A8A;
    }
    *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      font-family: 'Montserrat', sans-serif;
      font-weight: 300;
      background: var(--cream);
      color: var(--text);
      min-height: 100vh;
      -webkit-font-smoothing: antialiased;
    }

    /* ── Nav ── */
    .portal-shell-nav {
      position: fixed; top: 0; left: 0; right: 0; z-index: 100;
      background: var(--cream);
      border-bottom: 1px solid var(--linen);
      padding: 18px 48px;
      display: grid;
      grid-template-columns: minmax(180px, 1fr) auto minmax(180px, 1fr);
      align-items: center;
      gap: 24px;
    }
    .logo-wrap { line-height: 1; }
    .logo-main {
      display: block;
      font-family: 'Gilda Display', serif;
      font-size: 11px;
      letter-spacing: 0.28em;
      text-transform: uppercase;
      color: var(--black);
    }
    .logo-script {
      font-family: 'Pinyon Script', cursive;
      font-size: 26px;
      color: var(--green);
      line-height: 1;
    }
    .nav-right {
      display: flex;
      align-items: center;
      justify-content: flex-end;
      gap: 20px;
    }
    .nav-account-link {
      font-size: 10px;
      font-weight: 600;
      letter-spacing: 0.18em;
      text-transform: uppercase;
      color: var(--mid);
      text-decoration: none;
      transition: color 0.2s;
    }
    .nav-account-link:hover { color: var(--green); }
    .sign-out-btn {
      font-family: 'Montserrat', sans-serif;
      font-size: 9px;
      font-weight: 600;
      letter-spacing: 0.28em;
      text-transform: uppercase;
      background: transparent;
      border: 1px solid var(--linen);
      color: var(--mid);
      padding: 8px 16px;
      cursor: pointer;
      transition: all 0.2s;
    }
    .sign-out-btn:hover { border-color: var(--teal); color: var(--green); }

    /* ── Main ── */
    main {
      max-width: 960px;
      margin: 0 auto;
      padding: 120px 48px 80px;
    }

    .page-header { margin-bottom: 48px; }
    .eyebrow {
      font-size: 9.5px;
      font-weight: 600;
      letter-spacing: 0.42em;
      text-transform: uppercase;
      color: var(--teal);
      margin-bottom: 12px;
    }
    .page-title {
      font-family: 'Gilda Display', serif;
      font-size: 36px;
      color: var(--black);
      font-weight: 400;
    }

    /* ── Gallery grid ── */
    .gallery-grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(280px, 1fr));
      gap: 28px;
    }

    .gallery-card {
      background: #fff;
      border: 1px solid var(--linen);
      padding: 28px 26px;
      transition: box-shadow 0.25s, border-color 0.25s;
    }
    .gallery-card:hover {
      box-shadow: 0 4px 24px rgba(0,0,0,0.09);
      border-color: var(--teal);
    }

    .card-event {
      font-family: 'Gilda Display', serif;
      font-size: 19px;
      color: var(--black);
      margin-bottom: 4px;
      line-height: 1.3;
    }
    .card-client {
      font-size: 11px;
      color: var(--mid);
      letter-spacing: 0.04em;
      margin-bottom: 16px;
    }
    .card-meta {
      font-size: 10px;
      color: var(--light);
      letter-spacing: 0.04em;
      margin-bottom: 8px;
    }
    .card-pw {
      font-size: 11px;
      font-weight: 500;
      color: var(--green);
      letter-spacing: 0.08em;
      margin-bottom: 20px;
    }
    .card-pw-label {
      font-size: 9px;
      font-weight: 600;
      letter-spacing: 0.3em;
      text-transform: uppercase;
      color: var(--light);
      margin-right: 6px;
    }
    .wm-badge {
      display: inline-block;
      font-size: 8.5px;
      font-weight: 600;
      letter-spacing: 0.2em;
      text-transform: uppercase;
      color: var(--teal);
      border: 1px solid rgba(143,191,190,0.4);
      padding: 3px 10px;
      margin-bottom: 16px;
    }

    .btn-view {
      display: block;
      width: 100%;
      padding: 12px;
      font-family: 'Montserrat', sans-serif;
      font-size: 10px;
      font-weight: 600;
      letter-spacing: 0.28em;
      text-transform: uppercase;
      text-align: center;
      text-decoration: none;
      background: var(--green);
      color: #fff;
      border: none;
      cursor: pointer;
      transition: background 0.2s;
    }
    .btn-view:hover { background: #1e4532; }

    /* ── States ── */
    .state-loading, .state-empty, .state-error {
      text-align: center;
      padding: 64px 20px;
      color: var(--light);
      font-size: 13px;
      line-height: 1.8;
    }
    .state-error { color: #dc2626; }

    .spinner {
      width: 32px; height: 32px;
      border: 2px solid var(--linen);
      border-top-color: var(--green);
      border-radius: 50%;
      animation: spin 0.7s linear infinite;
      margin: 0 auto 16px;
    }
    @keyframes spin { to { transform: rotate(360deg); } }

    /* ── Portal tab nav ── */
    .portal-tabs {
      display: flex;
      justify-content: center;
      gap: 8px;
    }
    .portal-tab-link {
      font-family: 'Montserrat', sans-serif;
      font-size: 10px;
      font-weight: 600;
      letter-spacing: 0.28em;
      text-transform: uppercase;
      color: var(--mid);
      text-decoration: none;
      padding: 10px 14px;
      border-bottom: 2px solid transparent;
      transition: color 0.2s, border-color 0.2s;
    }
    .portal-tab-link:hover { color: var(--green); }
    .portal-tab-link.active { color: var(--green); border-bottom-color: var(--green); }
    .portal-tab-link.disabled { opacity: 0.35; cursor: default; pointer-events: none; }

    /* ── Portal sections ── */
    .portal-section {
      margin-top: 56px;
      border-top: 1px solid var(--linen);
      padding-top: 40px;
    }
    .section-heading {
      font-family: 'Gilda Display', serif;
      font-size: 1.5rem;
      font-weight: 400;
      color: var(--black);
      margin-bottom: 20px;
    }
    .invoice-row {
      background: #fff;
      border: 1px solid var(--linen);
      border-radius: 6px;
      padding: 16px 20px;
      margin-bottom: 10px;
      display: flex;
      justify-content: space-between;
      align-items: center;
      gap: 16px;
      flex-wrap: wrap;
    }
    .invoice-row-left { flex: 1; min-width: 160px; }
    .invoice-row-number { font-size: 14px; font-weight: 500; color: var(--black); }
    .invoice-row-meta { font-size: 12px; color: var(--mid); margin-top: 3px; }
    .invoice-badge {
      display: inline-block;
      font-size: 10px;
      font-weight: 600;
      letter-spacing: 0.06em;
      text-transform: uppercase;
      padding: 3px 10px;
      border-radius: 20px;
      margin-right: 6px;
    }
    .badge-paid   { background: #d1f0e3; color: #145a35; }
    .badge-sent   { background: #e8f4fd; color: #0d47a1; }
    .badge-void   { background: #fce8e8; color: #7f0000; }
    .invoice-pay-btn {
      display: inline-block;
      background: var(--green);
      color: #fff;
      font-family: 'Montserrat', sans-serif;
      font-size: 11px;
      font-weight: 600;
      letter-spacing: 0.08em;
      text-transform: uppercase;
      padding: 9px 18px;
      text-decoration: none;
      border-radius: 4px;
      white-space: nowrap;
    }
    .invoice-view-link {
      font-size: 12px;
      color: var(--green);
      text-decoration: none;
      font-weight: 500;
    }
    .invoice-view-link:hover { text-decoration: underline; }

    /* ── Document rows ── */
    .doc-row {
      background: #fff;
      border: 1px solid var(--linen);
      border-radius: 6px;
      padding: 16px 20px;
      margin-bottom: 10px;
      display: flex;
      justify-content: space-between;
      align-items: center;
      gap: 16px;
      flex-wrap: wrap;
    }
    .doc-row-left { flex: 1; min-width: 160px; }
    .doc-title { font-size: 14px; font-weight: 500; color: var(--black); }
    .doc-meta { font-size: 12px; color: var(--mid); margin-top: 3px; }
    .badge-awaiting { background: #fff7e6; color: #92580a; }
    .badge-pending  { background: #e8f4fd; color: #0d47a1; }
    .badge-executed { background: #d1f0e3; color: #145a35; }
    .doc-sign-btn {
      display: inline-block;
      background: var(--green);
      color: #fff;
      font-family: 'Montserrat', sans-serif;
      font-size: 11px;
      font-weight: 600;
      letter-spacing: 0.08em;
      text-transform: uppercase;
      padding: 9px 18px;
      text-decoration: none;
      border-radius: 4px;
      white-space: nowrap;
    }

    @media (max-width: 640px) {
      .portal-shell-nav {
        grid-template-columns: 1fr;
        justify-items: center;
        padding: 14px 20px;
        gap: 12px;
      }
      .nav-right { justify-content: center; }
      main { padding: 168px 20px 60px; }
    }
  </style>
</head>
<body>

<nav class="portal-shell-nav">
  <a href="/" style="text-decoration:none">
    <div class="logo-wrap">
      <span class="logo-main">Coastal</span>
      <span class="logo-script">Travel Company</span>
    </div>
  </a>
  <div class="portal-tabs" aria-label="Portal sections">
    <a class="portal-tab-link active" id="accountTabLink" href="/portal.html">My Account</a>
    <a class="portal-tab-link" id="projectTabLink" href="/portal-project.html">My Project</a>
    <a class="portal-tab-link" id="profileTabLink" href="/profile.html">My Profile</a>
  </div>
  <div class="nav-right">
    <a href="profile.html" class="nav-account-link" id="navAccountLink"></a>
    <button class="sign-out-btn" onclick="signOut()">Sign Out</button>
  </div>
</nav>

<main>
  <div class="page-header">
    <p class="eyebrow">Client Portal</p>
    <h1 class="page-title">My Account</h1>
  </div>

  <!-- Galleries -->
  <h2 class="section-heading">Galleries</h2>
  <div id="galleries-content">
    <div class="state-loading">
      <div class="spinner"></div>
      Loading your galleries…
    </div>
  </div>

  <!-- Documents -->
  <div class="portal-section" id="documents-section">
    <h2 class="section-heading">Documents</h2>
    <div id="documents-content"></div>
  </div>

  <!-- Invoices -->
  <div class="portal-section" id="invoices-section">
    <h2 class="section-heading">Invoices</h2>
    <div id="invoices-content"></div>
  </div>
</main>

<script>
  const WORKER_URL = CTC_CONFIG.workerUrl;

  const JWT_KEY           = 'ctc_jwt';
  const USER_KEY          = 'ctc_user';
  const MASQUERADE_TOKEN_KEY = 'ctc_masquerade_token';
  const MASQUERADE_USER_KEY  = 'ctc_masquerade_user';
  const isAdminPreview = new URLSearchParams(window.location.search).has('preview');
  const isMasquerade   = !!sessionStorage.getItem(MASQUERADE_TOKEN_KEY);

  function portalHref(path, hash = '') {
    return path + (isAdminPreview ? '?preview=1' : '') + hash;
  }

  async function signOut() {
    localStorage.removeItem(JWT_KEY);
    localStorage.removeItem(USER_KEY);
    await fetch(WORKER_URL + '/auth/logout', { method: 'POST', credentials: 'include' }).catch(() => {});
    window.location.href = '/login.html';
  }

  async function exitMasquerade() {
    const masqToken = sessionStorage.getItem(MASQUERADE_TOKEN_KEY);
    if (masqToken) {
      await fetch(WORKER_URL + '/admin/masquerade/exit', {
        method:  'POST',
        headers: { 'Authorization': 'Bearer ' + masqToken },
      }).catch(() => {});
    }
    sessionStorage.removeItem(MASQUERADE_TOKEN_KEY);
    sessionStorage.removeItem(MASQUERADE_USER_KEY);
    window.location.href = '/admin/clients.html';
  }

  function encode(obj) {
    return btoa(unescape(encodeURIComponent(JSON.stringify(obj))));
  }

  function buildGalleryUrl(g) {
    const config = {
      id:          g.id,
      nasClientUrl: g.nasClientUrl || CTC_CONFIG.nasClientUrl,
      proxyUrl:    g.proxyUrl || WORKER_URL,
      eventName:   g.eventName,
      clientName:  g.clientName,
      watermark:   g.watermark || false,
    };
    return CTC_CONFIG.mainSiteUrl + '#' + encode(config);
  }

  function renderGalleries(galleries) {
    const el = document.getElementById('galleries-content');
    if (!galleries.length) {
      el.innerHTML = `<div class="state-empty">
        No galleries have been assigned to your account yet.<br>
        Contact your photographer to get access.
      </div>`;
      return;
    }
    el.innerHTML = `<div class="gallery-grid">${galleries.map(renderCard).join('')}</div>`;
  }

  function renderCard(g) {
    const url     = buildGalleryUrl(g);
    const created = g.created
      ? new Date(g.created).toLocaleDateString('en-US', { year: 'numeric', month: 'long', day: 'numeric' })
      : '';
    return `
      <div class="gallery-card">
        <div class="card-event">${esc(g.eventName)}</div>
        <div class="card-client">${esc(g.clientName)}</div>
        ${g.watermark ? '<div class="wm-badge">Watermarked Preview</div>' : ''}
        ${created ? `<div class="card-meta">Delivered ${esc(created)}</div>` : ''}
        <a href="${url}" target="_blank" class="btn-view">View Gallery</a>
      </div>`;
  }

  function esc(s) {
    return String(s || '').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
  }

  function renderContracts(contracts) {
    const section = document.getElementById('documents-section');
    const content = document.getElementById('documents-content');
    if (!contracts.length) {
      section.style.display = '';
      content.innerHTML = '<div class="state-empty">No documents have been sent yet.</div>';
      return;
    }
    section.style.display = '';
    content.innerHTML = contracts.map(c => {
      const context = [c.collection, c.property].filter(Boolean).join(' · ');
      const created = c.created_at
        ? new Date(c.created_at).toLocaleDateString('en-US', { year: 'numeric', month: 'long', day: 'numeric' })
        : '';
      let badgeCls, badgeLabel, action;
      if (c.status === 'fully_executed') {
        badgeCls = 'badge-executed'; badgeLabel = 'Fully Executed';
        action = `<a class="invoice-view-link" href="${esc(c.public_url)}">View →</a>`;
      } else if (c.status === 'client_signed') {
        badgeCls = 'badge-pending'; badgeLabel = 'Awaiting Countersignature';
        action = `<a class="invoice-view-link" href="${esc(c.public_url)}">View →</a>`;
      } else {
        badgeCls = 'badge-awaiting'; badgeLabel = 'Signature Required';
        action = `<a class="doc-sign-btn" href="${esc(c.public_url)}">Review &amp; Sign</a>`;
      }
      return `<div class="doc-row">
        <div class="doc-row-left">
          <div class="doc-title">${esc(c.title)}</div>
          <div class="doc-meta">
            <span class="invoice-badge ${badgeCls}">${badgeLabel}</span>
            ${esc(created)}${context ? ' · ' + esc(context) : ''}
          </div>
        </div>
        <div style="display:flex;gap:10px;align-items:center;">${action}</div>
      </div>`;
    }).join('');
  }

  function renderInvoices(invoices) {
    const section = document.getElementById('invoices-section');
    const content = document.getElementById('invoices-content');
    if (!invoices.length) {
      section.style.display = '';
      content.innerHTML = '<div class="state-empty">No invoices have been sent yet.</div>';
      return;
    }
    section.style.display = '';
    content.innerHTML = invoices.map(inv => {
      const total = '$' + (inv.total_cents / 100).toLocaleString('en-US', { minimumFractionDigits: 2, maximumFractionDigits: 2 });
      const dueStr = inv.due_date
        ? 'Due ' + new Date(inv.due_date + 'T12:00:00').toLocaleDateString('en-US', { year: 'numeric', month: 'long', day: 'numeric' })
        : '';
      const paidStr = inv.paid_at
        ? 'Paid ' + new Date(inv.paid_at).toLocaleDateString('en-US', { year: 'numeric', month: 'long', day: 'numeric' })
        : '';
      const context = [inv.collection, inv.property].filter(Boolean).join(' · ');
      const badgeCls = inv.status === 'paid' ? 'badge-paid' : inv.status === 'void' ? 'badge-void' : 'badge-sent';
      const badgeLabel = inv.status === 'paid' ? 'Paid' : inv.status === 'void' ? 'Void' : 'Due';
      return `<div class="invoice-row">
        <div class="invoice-row-left">
          <div class="invoice-row-number">${esc(inv.invoice_number)} — ${total}</div>
          <div class="invoice-row-meta">
            <span class="invoice-badge ${badgeCls}">${badgeLabel}</span>
            ${esc(paidStr || dueStr || '')}${context ? ' · ' + esc(context) : ''}
          </div>
        </div>
        <div style="display:flex;gap:10px;align-items:center;">
          ${inv.status === 'sent' ? `<a class="invoice-pay-btn" href="${esc(inv.public_url)}">Pay ${total}</a>` : `<a class="invoice-view-link" href="${esc(inv.public_url)}">View →</a>`}
        </div>
      </div>`;
    }).join('');
  }

  async function load() {
    // Masquerade session: use the scoped masquerade JWT stored in sessionStorage
    const masqToken = isMasquerade ? sessionStorage.getItem(MASQUERADE_TOKEN_KEY) : null;
    if (isMasquerade && !masqToken) {
      // Masquerade param present but no token — session missing or expired
      window.location.href = '/admin/clients.html';
      return;
    }

    // Build fetch options: masquerade uses masq token; regular sessions use cookie + JWT Bearer fallback
    function authFetch(url, opts = {}) {
      if (masqToken) {
        return fetch(url, { ...opts, headers: { ...(opts.headers || {}), 'Authorization': 'Bearer ' + masqToken } });
      }
      const jwt = localStorage.getItem(JWT_KEY);
      const headers = jwt ? { ...(opts.headers || {}), 'Authorization': 'Bearer ' + jwt } : (opts.headers || {});
      return fetch(url, { ...opts, credentials: 'include', headers });
    }

    // Verify session
    const meRes = await authFetch(WORKER_URL + '/auth/me').catch(() => null);

    if (!meRes || !meRes.ok) {
      if (isMasquerade) {
        sessionStorage.removeItem(MASQUERADE_TOKEN_KEY);
        sessionStorage.removeItem(MASQUERADE_USER_KEY);
        window.location.href = '/admin/clients.html';
      } else {
        localStorage.removeItem(JWT_KEY);
        localStorage.removeItem(USER_KEY);
        window.location.href = '/login.html';
      }
      return;
    }

    const user = await meRes.json();
    const accountLink = document.getElementById('navAccountLink');
    accountLink.textContent = user.name || user.email;
    accountLink.title = user.email;

    // Masquerade: show amber banner with client identity and exit button
    if (isMasquerade && masqToken) {
      let masqUserName = user.name || user.email;
      try {
        const saved = JSON.parse(sessionStorage.getItem(MASQUERADE_USER_KEY) || '{}');
        masqUserName = saved.name || saved.email || masqUserName;
      } catch {}
      const banner = document.createElement('div');
      banner.style.cssText = 'position:fixed;top:0;left:0;right:0;z-index:999;background:#f59e0b;color:#000;text-align:center;padding:7px 16px;font-family:Montserrat,sans-serif;font-size:10px;font-weight:600;letter-spacing:0.2em;text-transform:uppercase;';
      banner.innerHTML = `Admin View — Viewing portal as <strong>${masqUserName}</strong> &nbsp;&middot;&nbsp; <a href="#" onclick="exitMasquerade();return false;" style="color:#000;text-decoration:underline;">Exit Masquerade</a>`;
      document.body.prepend(banner);
      document.querySelector('.portal-shell-nav').style.top = '33px';
      document.querySelector('main').style.paddingTop = window.matchMedia('(max-width: 640px)').matches ? '201px' : '153px';
    }

    // Admins have a dedicated admin panel; redirect unless previewing the customer view
    if (user.role === 'admin' && !isAdminPreview && !isMasquerade) {
      window.location.href = '/admin/pipeline.html';
      return;
    }
    if (user.role === 'admin' && isAdminPreview) {
      const banner = document.createElement('div');
      banner.style.cssText = 'position:fixed;top:0;left:0;right:0;z-index:999;background:#f59e0b;color:#000;text-align:center;padding:7px 16px;font-family:Montserrat,sans-serif;font-size:10px;font-weight:600;letter-spacing:0.2em;text-transform:uppercase;';
      banner.innerHTML = 'Admin Preview — this is how clients see the portal &nbsp;·&nbsp; <a href="/admin/galleries.html" style="color:#000;text-decoration:underline;">Back to Admin</a>';
      document.body.prepend(banner);
      document.querySelector('.portal-shell-nav').style.top = '33px';
      document.querySelector('main').style.paddingTop = window.matchMedia('(max-width: 640px)').matches ? '201px' : '153px';
    }

    document.getElementById('accountTabLink').href = portalHref('/portal.html');
    document.getElementById('profileTabLink').href  = portalHref('/profile.html');

    // Fetch galleries, contracts, and invoices in parallel
    const [galRes, conRes, invRes] = await Promise.all([
      authFetch(WORKER_URL + '/portal/galleries').catch(() => null),
      authFetch(WORKER_URL + '/portal/contracts').catch(() => null),
      authFetch(WORKER_URL + '/portal/invoices').catch(() => null),
    ]);

    if (!galRes || !galRes.ok) {
      document.getElementById('galleries-content').innerHTML =
        '<div class="state-error">Could not load galleries. Please try again later.</div>';
      return;
    }

    document.getElementById('projectTabLink').href = portalHref('/portal-project.html');

    renderGalleries(await galRes.json());

    if (conRes && conRes.ok) renderContracts(await conRes.json());
