<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Sign In — Coastal Travel Company</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Gilda+Display&family=Pinyon+Script&family=Montserrat:wght@300;400;500;600&display=swap" rel="stylesheet" />
  <script src="https://accounts.google.com/gsi/client" async defer></script>
  <style>
    :root {
      --black:  #1C1C1C;
      --green:  #2A5C45;
      --teal:   #8FBFBE;
      --cream:  #F4F1EC;
      --linen:  #E8DDD0;
      --text:   #2C2C2C;
      --mid:    #5A5A5A;
      --light:  #8A8A8A;
    }
    *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      font-family: 'Montserrat', sans-serif;
      font-weight: 300;
      background: var(--cream);
      color: var(--text);
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      padding: 40px 20px;
      -webkit-font-smoothing: antialiased;
    }

    .brand {
      text-align: center;
      margin-bottom: 36px;
    }
    .brand-main {
      display: block;
      font-family: 'Gilda Display', serif;
      font-size: 12px;
      letter-spacing: 0.32em;
      text-transform: uppercase;
      color: var(--black);
    }
    .brand-script {
      font-family: 'Pinyon Script', cursive;
      font-size: 38px;
      color: var(--green);
      line-height: 1.1;
    }

    .card {
      background: #fff;
      width: 100%;
      max-width: 400px;
      padding: 40px 36px;
      box-shadow: 0 2px 24px rgba(0,0,0,0.07);
    }

    .card-title {
      font-family: 'Gilda Display', serif;
      font-size: 22px;
      color: var(--black);
      margin-bottom: 6px;
    }
    .card-sub {
      font-size: 12px;
      color: var(--light);
      margin-bottom: 28px;
      line-height: 1.6;
    }

    .fg { display: flex; flex-direction: column; gap: 6px; margin-bottom: 16px; }
    label {
      font-size: 9px;
      font-weight: 600;
      letter-spacing: 0.38em;
      text-transform: uppercase;
      color: var(--light);
    }
    input[type=email], input[type=password], input[type=text] {
      background: var(--cream);
      border: 1px solid var(--linen);
      padding: 11px 14px;
      color: var(--text);
      font-family: 'Montserrat', sans-serif;
      font-size: 13.5px;
      font-weight: 300;
      outline: none;
      width: 100%;
      transition: border-color 0.2s;
    }
    input:focus { border-color: var(--teal); }
    input::placeholder { color: rgba(28,28,28,0.3); }

    .btn {
      display: block;
      width: 100%;
      padding: 13px;
      font-family: 'Montserrat', sans-serif;
      font-size: 10px;
      font-weight: 600;
      letter-spacing: 0.3em;
      text-transform: uppercase;
      border: none;
      cursor: pointer;
      transition: background 0.2s;
      margin-top: 6px;
    }
    .btn-primary { background: var(--green); color: #fff; }
    .btn-primary:hover { background: #1e4532; }
    .btn-primary:disabled { opacity: 0.5; cursor: not-allowed; }
    .btn-ghost {
      background: transparent;
      color: var(--mid);
      border: 1px solid var(--linen);
      margin-top: 10px;
    }
    .btn-ghost:hover { border-color: var(--teal); color: var(--green); }

    .divider {
      display: flex; align-items: center; gap: 12px;
      margin: 20px 0;
      font-size: 10px; letter-spacing: 0.2em; text-transform: uppercase; color: var(--light);
    }
    .divider::before, .divider::after {
      content: ''; flex: 1; height: 1px; background: var(--linen);
    }

    #googleBtnWrap { display: flex; justify-content: center; }

    .link-row {
      text-align: center;
      margin-top: 20px;
      font-size: 11.5px;
      color: var(--mid);
    }
    .link-row a {
      color: var(--green);
      text-decoration: none;
      cursor: pointer;
    }
    .link-row a:hover { text-decoration: underline; }

    .error-msg {
      background: #fef2f2;
      border: 1px solid #fecaca;
      color: #dc2626;
      font-size: 12px;
      padding: 10px 14px;
      margin-bottom: 16px;
      line-height: 1.5;
      display: none;
    }
    .error-msg.show { display: block; }

    .success-msg {
      background: #f0fdf4;
      border: 1px solid #bbf7d0;
      color: #166534;
      font-size: 12px;
      padding: 10px 14px;
      margin-bottom: 16px;
      line-height: 1.5;
      display: none;
    }
    .success-msg.show { display: block; }

    .hidden { display: none !important; }

    .back-link {
      display: inline-block;
      font-size: 11px;
      color: var(--mid);
      cursor: pointer;
      margin-bottom: 20px;
    }
    .back-link:hover { color: var(--green); }
  </style>
</head>
<body>

<div class="brand">
  <span class="brand-main">Coastal</span>
  <span class="brand-script">Travel Company</span>
</div>

<!-- ── Login form ── -->
<div class="card" id="loginCard">
  <h1 class="card-title">Sign In</h1>
  <p class="card-sub">Access your client gallery</p>
  <div class="error-msg" id="loginError"></div>
  <form id="loginForm" autocomplete="on">
    <div class="fg">
      <label>Email</label>
      <input type="email" id="loginEmail" placeholder="you@example.com" required autocomplete="email" />
    </div>
    <div class="fg">
      <label>Password</label>
      <input type="password" id="loginPassword" placeholder="••••••••" required autocomplete="current-password" />
    </div>
    <button class="btn btn-primary" type="submit" id="loginBtn">Sign In</button>
  </form>
  <div id="googleSection">
    <div class="divider">or</div>
    <div id="googleBtnWrap"></div>
  </div>
  <div class="link-row">
    <a id="forgotLink">Forgot password?</a>
  </div>
</div>

<!-- ── First-time setup ── -->
<div class="card hidden" id="setupCard">
  <h1 class="card-title">Create Admin Account</h1>
  <p class="card-sub">No accounts exist yet. Set up the first admin account.</p>
  <div class="error-msg" id="setupError"></div>
  <form id="setupForm" autocomplete="off">
    <div class="fg">
      <label>Email</label>
      <input type="email" id="setupEmail" placeholder="admin@example.com" required />
    </div>
    <div class="fg">
      <label>Password (min 8 characters)</label>
      <input type="password" id="setupPassword" placeholder="••••••••" required minlength="8" />
    </div>
    <button class="btn btn-primary" type="submit" id="setupBtn">Create Admin Account</button>
  </form>
</div>

<!-- ── Forgot password ── -->
<div class="card hidden" id="forgotCard">
  <span class="back-link" id="forgotBack">← Back to sign in</span>
  <h1 class="card-title">Reset Password</h1>
  <p class="card-sub">Enter your email and we'll send a reset link.</p>
  <div class="error-msg" id="forgotError"></div>
  <div class="success-msg" id="forgotSuccess"></div>
  <form id="forgotForm">
    <div class="fg">
      <label>Email</label>
      <input type="email" id="forgotEmail" placeholder="you@example.com" required />
    </div>
    <button class="btn btn-primary" type="submit" id="forgotBtn">Send Reset Link</button>
  </form>
</div>

<!-- ── Reset password ── -->
<div class="card hidden" id="resetCard">
  <h1 class="card-title">New Password</h1>
  <p class="card-sub">Choose a new password for your account.</p>
  <div class="error-msg" id="resetError"></div>
  <div class="success-msg" id="resetSuccess"></div>
  <form id="resetForm">
    <div class="fg">
      <label>New Password (min 8 characters)</label>
      <input type="password" id="resetPassword" placeholder="••••••••" required minlength="8" />
    </div>
    <div class="fg">
      <label>Confirm Password</label>
      <input type="password" id="resetConfirm" placeholder="••••••••" required minlength="8" />
    </div>
    <button class="btn btn-primary" type="submit" id="resetBtn">Set New Password</button>
  </form>
</div>

<script>
  // ── Config ────────────────────────────────────────────────────────────────
  // Set your Google OAuth Client ID here (from Google Cloud Console).
  // Get one at: https://console.cloud.google.com/apis/credentials
  // Add https://coastaltravelcompany.com to "Authorized JavaScript origins".
  // Leave empty to hide the Google Sign-In button.
  const GOOGLE_CLIENT_ID = '';

  const WORKER_URL = (() => {
    try {
      const s = JSON.parse(localStorage.getItem('ctc_settings_v1') || '{}');
      return (s.workerUrl || '').replace(/\/$/, '') ||
        'https://coastal-gallery-proxy.thecoastaltravelcompany.workers.dev';
    } catch { return 'https://coastal-gallery-proxy.thecoastaltravelcompany.workers.dev'; }
  })();

  const JWT_KEY  = 'ctc_jwt';
  const USER_KEY = 'ctc_user';

  // ── Helpers ───────────────────────────────────────────────────────────────
  function showCard(id) {
    ['loginCard','setupCard','forgotCard','resetCard'].forEach(c => {
      document.getElementById(c).classList.toggle('hidden', c !== id);
    });
  }

  function showError(id, msg) {
    const el = document.getElementById(id);
    el.textContent = msg;
    el.classList.add('show');
  }
  function hideError(id) { document.getElementById(id).classList.remove('show'); }

  function showSuccess(id, msg) {
    const el = document.getElementById(id);
    el.textContent = msg;
    el.classList.add('show');
  }

  async function api(path, body, method = 'POST') {
    const res = await fetch(WORKER_URL + path, {
      method,
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify(body),
    });
    const data = await res.json();
    return { ok: res.ok, status: res.status, data };
  }

  function storeAuth(token, user) {
    localStorage.setItem(JWT_KEY, token);
    localStorage.setItem(USER_KEY, JSON.stringify(user));
  }

  function redirect(user) {
    const dest = user.role === 'admin' ? '/admin/gallery-admin.html' : '/portal.html';
    window.location.href = dest;
  }

  // ── Init ──────────────────────────────────────────────────────────────────
  async function init() {
    // Already logged in?
    const token = localStorage.getItem(JWT_KEY);
    if (token) {
      const res = await fetch(WORKER_URL + '/auth/me', {
        headers: { 'Authorization': 'Bearer ' + token },
      }).catch(() => null);
      if (res && res.ok) {
        const user = await res.json();
        redirect(user);
        return;
      }
      localStorage.removeItem(JWT_KEY);
      localStorage.removeItem(USER_KEY);
    }

    // Password reset flow
    const params = new URLSearchParams(window.location.search);
    const resetToken = params.get('reset');
    if (resetToken) {
      showCard('resetCard');
      document.getElementById('resetForm').dataset.token = resetToken;
      return;
    }

    // Check if setup is needed
    try {
      const res  = await fetch(WORKER_URL + '/auth/setup-status');
      const data = await res.json();
      if (!data.configured) {
        showCard('setupCard');
        return;
      }
    } catch {
      // If worker unreachable, show login anyway
    }

    showCard('loginCard');
    initGoogle();
  }

  // ── Google Sign-In ────────────────────────────────────────────────────────
  function initGoogle() {
    if (!GOOGLE_CLIENT_ID || typeof google === 'undefined') {
      document.getElementById('googleSection').classList.add('hidden');
      return;
    }
    google.accounts.id.initialize({
      client_id: GOOGLE_CLIENT_ID,
      callback:  handleGoogleCredential,
    });
    google.accounts.id.renderButton(
      document.getElementById('googleBtnWrap'),
      { theme: 'outline', size: 'large', width: 328, text: 'signin_with' }
    );
  }

  async function handleGoogleCredential(response) {
    const { ok, data } = await api('/auth/google', { credential: response.credential });
    if (!ok) {
      showError('loginError', data.error || 'Google sign-in failed.');
      return;
    }
    storeAuth(data.token, data.user);
    redirect(data.user);
  }

  // ── Login form ────────────────────────────────────────────────────────────
  document.getElementById('loginForm').addEventListener('submit', async e => {
    e.preventDefault();
    hideError('loginError');
    const btn  = document.getElementById('loginBtn');
    btn.disabled = true;
    btn.textContent = 'Signing in…';
    const email    = document.getElementById('loginEmail').value.trim();
    const password = document.getElementById('loginPassword').value;
    const { ok, data } = await api('/auth/login', { email, password });
    if (!ok) {
      showError('loginError', data.error || 'Sign-in failed.');
      btn.disabled = false;
      btn.textContent = 'Sign In';
      return;
    }
    storeAuth(data.token, data.user);
    redirect(data.user);
  });

  // ── Setup form (first admin) ───────────────────────────────────────────────
  document.getElementById('setupForm').addEventListener('submit', async e => {
    e.preventDefault();
    hideError('setupError');
    const btn  = document.getElementById('setupBtn');
    btn.disabled = true;
    btn.textContent = 'Creating account…';
    const email    = document.getElementById('setupEmail').value.trim();
    const password = document.getElementById('setupPassword').value;
    const { ok, data } = await api('/auth/setup', { email, password });
    if (!ok) {
      showError('setupError', data.error || 'Setup failed.');
      btn.disabled = false;
      btn.textContent = 'Create Admin Account';
      return;
    }
    storeAuth(data.token, data.user);
    redirect(data.user);
  });

  // ── Forgot password ───────────────────────────────────────────────────────
  document.getElementById('forgotLink').addEventListener('click', () => {
    showCard('forgotCard');
  });
  document.getElementById('forgotBack').addEventListener('click', () => {
    showCard('loginCard');
    initGoogle();
  });

  document.getElementById('forgotForm').addEventListener('submit', async e => {
    e.preventDefault();
    hideError('forgotError');
    const btn  = document.getElementById('forgotBtn');
    btn.disabled = true;
    btn.textContent = 'Sending…';
    const email = document.getElementById('forgotEmail').value.trim();
    await api('/auth/reset-request', { email });
    showSuccess('forgotSuccess', 'If an account exists for that email, a reset link has been sent.');
    document.getElementById('forgotForm').classList.add('hidden');
    btn.disabled = false;
    btn.textContent = 'Send Reset Link';
  });

  // ── Reset password ────────────────────────────────────────────────────────
  document.getElementById('resetForm').addEventListener('submit', async e => {
    e.preventDefault();
    hideError('resetError');
    const btn      = document.getElementById('resetBtn');
    const password = document.getElementById('resetPassword').value;
    const confirm  = document.getElementById('resetConfirm').value;
    if (password !== confirm) {
      showError('resetError', 'Passwords do not match.');
      return;
    }
    const token = e.target.dataset.token;
    btn.disabled = true;
    btn.textContent = 'Saving…';
    const { ok, data } = await api('/auth/reset-confirm', { token, password });
    if (!ok) {
      showError('resetError', data.error || 'Reset failed. The link may have expired.');
      btn.disabled = false;
      btn.textContent = 'Set New Password';
      return;
    }
    showSuccess('resetSuccess', 'Password updated. Redirecting to sign in…');
    document.getElementById('resetForm').classList.add('hidden');
    setTimeout(() => {
      window.history.replaceState({}, '', '/login.html');
      showCard('loginCard');
      initGoogle();
    }, 2000);
  });

  // Google script may load after DOMContentLoaded — re-init when ready
  window.addEventListener('load', () => {
    if (document.getElementById('loginCard') &&
        !document.getElementById('loginCard').classList.contains('hidden')) {
      initGoogle();
    }
  });

  init();
</script>
</body>
</html>
