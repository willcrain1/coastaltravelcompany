<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Profile — Coastal Travel Company</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Gilda+Display&family=Pinyon+Script&family=Montserrat:wght@300;400;500;600&display=swap" rel="stylesheet" />
  <style>
    :root {
      --black: #1C1C1C;
      --green: #2A5C45;
      --teal:  #8FBFBE;
      --cream: #F4F1EC;
      --linen: #E8DDD0;
      --text:  #2C2C2C;
      --mid:   #5A5A5A;
      --light: #8A8A8A;
    }
    *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      font-family: 'Montserrat', sans-serif;
      font-weight: 300;
      background: var(--cream);
      color: var(--text);
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      padding: 40px 20px;
      -webkit-font-smoothing: antialiased;
    }

    .brand {
      text-align: center;
      margin-bottom: 36px;
    }
    .brand a { text-decoration: none; color: inherit; }
    .brand-main {
      display: block;
      font-family: 'Gilda Display', serif;
      font-size: 12px;
      letter-spacing: 0.32em;
      text-transform: uppercase;
      color: var(--black);
    }
    .brand-script {
      font-family: 'Pinyon Script', cursive;
      font-size: 38px;
      color: var(--green);
      line-height: 1.1;
    }

    .card {
      background: #fff;
      width: 100%;
      max-width: 400px;
      padding: 40px 36px;
      box-shadow: 0 2px 24px rgba(0,0,0,0.07);
    }

    /* ── Logged-out state ── */
    .card-title {
      font-family: 'Gilda Display', serif;
      font-size: 22px;
      color: var(--black);
      margin-bottom: 6px;
    }
    .card-sub {
      font-size: 12px;
      color: var(--light);
      margin-bottom: 28px;
      line-height: 1.6;
    }

    /* ── Logged-in state ── */
    .avatar {
      width: 56px;
      height: 56px;
      border-radius: 50%;
      background: var(--green);
      color: #fff;
      font-family: 'Gilda Display', serif;
      font-size: 22px;
      display: flex;
      align-items: center;
      justify-content: center;
      margin: 0 auto 20px;
    }
    .profile-email {
      text-align: center;
      font-size: 14px;
      font-weight: 500;
      color: var(--black);
      margin-bottom: 6px;
      word-break: break-all;
    }
    .role-badge {
      display: block;
      text-align: center;
      font-size: 9px;
      font-weight: 600;
      letter-spacing: 0.38em;
      text-transform: uppercase;
      color: var(--teal);
      margin-bottom: 28px;
    }
    .divider {
      height: 1px;
      background: var(--linen);
      margin: 24px 0;
    }

    .btn {
      display: block;
      width: 100%;
      padding: 13px;
      font-family: 'Montserrat', sans-serif;
      font-size: 10px;
      font-weight: 600;
      letter-spacing: 0.3em;
      text-transform: uppercase;
      text-align: center;
      text-decoration: none;
      border: none;
      cursor: pointer;
      transition: background 0.2s, border-color 0.2s, color 0.2s;
      margin-top: 10px;
    }
    .btn-primary { background: var(--green); color: #fff; }
    .btn-primary:hover { background: #1e4532; }
    .btn-ghost {
      background: transparent;
      color: var(--mid);
      border: 1px solid var(--linen);
    }
    .btn-ghost:hover { border-color: var(--teal); color: var(--green); }

    .hidden { display: none !important; }

    .spinner {
      width: 28px; height: 28px;
      border: 2px solid var(--linen);
      border-top-color: var(--green);
      border-radius: 50%;
      animation: spin 0.7s linear infinite;
      margin: 20px auto;
    }
    @keyframes spin { to { transform: rotate(360deg); } }
  </style>
</head>
<body>

<div class="brand">
  <a href="index.html">
    <span class="brand-main">Coastal</span>
    <span class="brand-script">Travel Company</span>
  </a>
</div>

<!-- ── Loading ── -->
<div class="card" id="loadingCard">
  <div class="spinner"></div>
</div>

<!-- ── Logged out ── -->
<div class="card hidden" id="loggedOutCard">
  <h1 class="card-title">Your Profile</h1>
  <p class="card-sub">Sign in to access your client galleries and account details.</p>
  <a href="login.html" class="btn btn-primary">Sign In</a>
  <a href="login.html" class="btn btn-ghost">Create Account</a>
</div>

<!-- ── Logged in ── -->
<div class="card hidden" id="loggedInCard">
  <div class="avatar" id="avatarInitial"></div>
  <p class="profile-email" id="profileEmail"></p>
  <span class="role-badge" id="profileRole"></span>
  <a href="#" class="btn btn-primary" id="portalBtn"></a>
  <div class="divider"></div>
  <button class="btn btn-ghost" onclick="signOut()">Sign Out</button>
</div>

<script>
  const WORKER_URL = (() => {
    try {
      const s = JSON.parse(localStorage.getItem('ctc_settings_v1') || '{}');
      return (s.workerUrl || '').replace(/\/$/, '') ||
        'https://coastal-gallery-proxy.thecoastaltravelcompany.workers.dev';
    } catch { return 'https://coastal-gallery-proxy.thecoastaltravelcompany.workers.dev'; }
  })();

  const JWT_KEY  = 'ctc_jwt';
  const USER_KEY = 'ctc_user';

  function show(id) {
    ['loadingCard', 'loggedOutCard', 'loggedInCard'].forEach(c => {
      document.getElementById(c).classList.toggle('hidden', c !== id);
    });
  }

  function signOut() {
    localStorage.removeItem(JWT_KEY);
    localStorage.removeItem(USER_KEY);
    show('loggedOutCard');
  }

  async function init() {
    const token = localStorage.getItem(JWT_KEY);
    if (!token) { show('loggedOutCard'); return; }

    const res = await fetch(WORKER_URL + '/auth/me', {
      headers: { 'Authorization': 'Bearer ' + token },
    }).catch(() => null);

    if (!res || !res.ok) {
      localStorage.removeItem(JWT_KEY);
      localStorage.removeItem(USER_KEY);
      show('loggedOutCard');
      return;
    }

    const user = await res.json();
    const initial = (user.email || '?')[0].toUpperCase();
    const isAdmin = user.role === 'admin';

    document.getElementById('avatarInitial').textContent = initial;
    document.getElementById('profileEmail').textContent  = user.email;
    document.getElementById('profileRole').textContent   = isAdmin ? 'Administrator' : 'Client';

    const btn = document.getElementById('portalBtn');
    btn.textContent = isAdmin ? 'Admin Panel' : 'My Galleries';
    btn.href        = isAdmin ? '/admin/gallery-admin.html' : '/portal.html';

    show('loggedInCard');
  }

  init();
</script>
</body>
</html>
