<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Account — Coastal Travel Company</title>
  <link rel="icon" href="favicon.svg" type="image/svg+xml" />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Gilda+Display&family=Pinyon+Script&family=Montserrat:wght@300;400;500;600&display=swap" rel="stylesheet" />
  <script src="config.js"></script>
  <style>
    :root {
      --black: #1C1C1C;
      --green: #2A5C45;
      --teal:  #8FBFBE;
      --cream: #F4F1EC;
      --linen: #E8DDD0;
      --text:  #2C2C2C;
      --mid:   #5A5A5A;
      --light: #8A8A8A;
    }
    *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      font-family: 'Montserrat', sans-serif;
      font-weight: 300;
      background: var(--cream);
      color: var(--text);
      min-height: 100vh;
      -webkit-font-smoothing: antialiased;
    }

    /* ── Nav ── */
    nav {
      position: fixed; top: 0; left: 0; right: 0; z-index: 100;
      background: var(--cream);
      border-bottom: 1px solid var(--linen);
      padding: 18px 48px;
      display: flex;
      align-items: center;
      justify-content: space-between;
    }
    .logo-wrap { line-height: 1; text-decoration: none; }
    .logo-main {
      display: block;
      font-family: 'Gilda Display', serif;
      font-size: 11px;
      letter-spacing: 0.28em;
      text-transform: uppercase;
      color: var(--black);
    }
    .logo-script {
      font-family: 'Pinyon Script', cursive;
      font-size: 26px;
      color: var(--green);
      line-height: 1;
    }
    .nav-right { display: flex; align-items: center; gap: 20px; }
    .nav-link {
      font-size: 10px;
      font-weight: 600;
      letter-spacing: 0.22em;
      text-transform: uppercase;
      color: var(--mid);
      text-decoration: none;
      transition: color 0.2s;
    }
    .nav-link:hover { color: var(--green); }
    .user-display { font-size: 11px; color: var(--light); letter-spacing: 0.04em; }
    .sign-out-btn {
      font-family: 'Montserrat', sans-serif;
      font-size: 9px;
      font-weight: 600;
      letter-spacing: 0.28em;
      text-transform: uppercase;
      background: transparent;
      border: 1px solid var(--linen);
      color: var(--mid);
      padding: 8px 16px;
      cursor: pointer;
      transition: all 0.2s;
    }
    .sign-out-btn:hover { border-color: var(--teal); color: var(--green); }

    /* ── Layout ── */
    main {
      max-width: 520px;
      margin: 0 auto;
      padding: 110px 24px 80px;
    }

    .page-header { margin-bottom: 36px; }
    .eyebrow {
      font-size: 9.5px;
      font-weight: 600;
      letter-spacing: 0.42em;
      text-transform: uppercase;
      color: var(--teal);
      margin-bottom: 10px;
    }
    .page-title {
      font-family: 'Gilda Display', serif;
      font-size: 32px;
      color: var(--black);
      font-weight: 400;
    }

    /* ── Cards ── */
    .card {
      background: #fff;
      padding: 32px 36px;
      box-shadow: 0 2px 16px rgba(0,0,0,0.06);
      margin-bottom: 20px;
    }
    .card-title {
      font-size: 9.5px;
      font-weight: 600;
      letter-spacing: 0.38em;
      text-transform: uppercase;
      color: var(--light);
      margin-bottom: 24px;
    }

    /* ── Avatar row ── */
    .identity {
      display: flex;
      align-items: center;
      gap: 16px;
      margin-bottom: 28px;
      padding-bottom: 24px;
      border-bottom: 1px solid var(--linen);
    }
    .avatar {
      width: 52px;
      height: 52px;
      border-radius: 50%;
      background: var(--green);
      color: #fff;
      font-family: 'Gilda Display', serif;
      font-size: 20px;
      display: flex;
      align-items: center;
      justify-content: center;
      flex-shrink: 0;
    }
    .identity-info { flex: 1; min-width: 0; }
    .identity-name {
      font-size: 15px;
      font-weight: 500;
      color: var(--black);
      margin-bottom: 3px;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }
    .identity-email {
      font-size: 11px;
      color: var(--light);
      letter-spacing: 0.02em;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }
    .role-badge {
      display: inline-block;
      font-size: 8.5px;
      font-weight: 600;
      letter-spacing: 0.32em;
      text-transform: uppercase;
      color: var(--teal);
      border: 1px solid rgba(143,191,190,0.5);
      padding: 3px 10px;
      flex-shrink: 0;
    }

    /* ── Forms ── */
    .fg {
      display: flex;
      flex-direction: column;
      gap: 6px;
      margin-bottom: 16px;
    }
    label {
      font-size: 9px;
      font-weight: 600;
      letter-spacing: 0.38em;
      text-transform: uppercase;
      color: var(--light);
    }
    input[type=text], input[type=password] {
      background: var(--cream);
      border: 1px solid var(--linen);
      padding: 11px 14px;
      color: var(--text);
      font-family: 'Montserrat', sans-serif;
      font-size: 13.5px;
      font-weight: 300;
      outline: none;
      width: 100%;
      transition: border-color 0.2s;
    }
    input:focus { border-color: var(--teal); }
    input::placeholder { color: rgba(28,28,28,0.3); }
    input:read-only {
      color: var(--light);
      cursor: default;
    }

    .field-hint {
      font-size: 11px;
      color: var(--light);
      line-height: 1.5;
    }

    .btn-row {
      display: flex;
      justify-content: flex-end;
      margin-top: 8px;
    }
    .btn {
      font-family: 'Montserrat', sans-serif;
      font-size: 9.5px;
      font-weight: 600;
      letter-spacing: 0.28em;
      text-transform: uppercase;
      padding: 11px 24px;
      border: none;
      cursor: pointer;
      transition: background 0.2s, border-color 0.2s, color 0.2s;
    }
    .btn:disabled { opacity: 0.5; cursor: not-allowed; }
    .btn-primary { background: var(--green); color: #fff; }
    .btn-primary:hover:not(:disabled) { background: #1e4532; }

    /* ── Feedback messages ── */
    .msg {
      font-size: 12px;
      padding: 10px 14px;
      margin-bottom: 16px;
      line-height: 1.5;
      display: none;
    }
    .msg.show { display: block; }
    .msg-error { background: #fef2f2; border: 1px solid #fecaca; color: #dc2626; }
    .msg-ok    { background: #f0fdf4; border: 1px solid #bbf7d0; color: #15803d; }

    /* ── Google-only note ── */
    .auth-note {
      font-size: 12px;
      color: var(--mid);
      line-height: 1.6;
      padding: 14px;
      background: var(--cream);
      border-left: 3px solid var(--linen);
    }

    /* ── Loading / redirect states ── */
    .spinner-wrap {
      display: flex;
      align-items: center;
      justify-content: center;
      min-height: calc(100vh - 70px);
    }
    .spinner {
      width: 28px; height: 28px;
      border: 2px solid var(--linen);
      border-top-color: var(--green);
      border-radius: 50%;
      animation: spin 0.7s linear infinite;
    }
    @keyframes spin { to { transform: rotate(360deg); } }

    .hidden { display: none !important; }

    @media (max-width: 560px) {
      nav { padding: 16px 20px; }
      main { padding: 100px 16px 60px; }
      .card { padding: 24px 20px; }
      .identity { flex-wrap: wrap; }
    }
  </style>
</head>
<body>

<nav>
  <a href="/" style="text-decoration:none">
    <div class="logo-wrap">
      <span class="logo-main">Coastal</span>
      <span class="logo-script">Travel Company</span>
    </div>
  </a>
  <div class="nav-right">
    <a href="portal.html" class="nav-link">My Galleries</a>
    <span class="user-display" id="navDisplay"></span>
    <button class="sign-out-btn" onclick="signOut()">Sign Out</button>
  </div>
</nav>

<div class="spinner-wrap" id="loadingState">
  <div class="spinner"></div>
</div>

<main id="mainContent" class="hidden">
  <div class="page-header">
    <p class="eyebrow">Settings</p>
    <h1 class="page-title">Your Account</h1>
  </div>

  <!-- ── Profile card ── -->
  <div class="card">
    <p class="card-title">Profile</p>

    <div class="identity">
      <div class="avatar" id="avatarInitial"></div>
      <div class="identity-info">
        <div class="identity-name" id="identityName"></div>
        <div class="identity-email" id="identityEmail"></div>
      </div>
      <span class="role-badge" id="roleBadge"></span>
    </div>

    <div class="msg msg-error" id="profileError"></div>
    <div class="msg msg-ok"    id="profileOk"></div>

    <form id="profileForm" autocomplete="off">
      <div class="fg">
        <label for="inputName">Display Name</label>
        <input type="text" id="inputName" placeholder="Jane Smith" autocomplete="name" />
      </div>
      <div class="fg">
        <label>Email</label>
        <input type="text" value="" id="inputEmail" readonly tabindex="-1" />
        <p class="field-hint">Email cannot be changed here. Contact support if you need to update it.</p>
      </div>
      <div class="btn-row">
        <button type="submit" class="btn btn-primary" id="profileBtn">Save Changes</button>
      </div>
    </form>
  </div>

  <!-- ── Security card ── -->
  <div class="card">
    <p class="card-title">Security</p>

    <div class="msg msg-error" id="pwError"></div>
    <div class="msg msg-ok"    id="pwOk"></div>

    <div id="passwordForm">
      <form id="pwForm" autocomplete="off">
        <div class="fg">
          <label for="inputCurrent">Current Password</label>
          <input type="password" id="inputCurrent" placeholder="••••••••" autocomplete="current-password" />
        </div>
        <div class="fg">
          <label for="inputNew">New Password</label>
          <input type="password" id="inputNew" placeholder="Min 8 characters" minlength="8" autocomplete="new-password" />
        </div>
        <div class="fg">
          <label for="inputConfirm">Confirm New Password</label>
          <input type="password" id="inputConfirm" placeholder="••••••••" minlength="8" autocomplete="new-password" />
        </div>
        <div class="btn-row">
          <button type="submit" class="btn btn-primary" id="pwBtn">Update Password</button>
        </div>
      </form>
    </div>

    <div class="auth-note hidden" id="googleNote">
      Your account uses Google Sign-In — no password is set. To add password login, use the password reset flow from the sign-in page.
    </div>
  </div>
</main>

<script>
  const WORKER_URL = CTC_CONFIG.workerUrl;
  const JWT_KEY    = 'ctc_jwt';
  const USER_KEY   = 'ctc_user';

  let currentUser = null;

  function signOut() {
    localStorage.removeItem(JWT_KEY);
    localStorage.removeItem(USER_KEY);
    window.location.href = '/login.html';
  }

  function getToken() { return localStorage.getItem(JWT_KEY); }

  async function apiFetch(path, opts = {}) {
    const token = getToken();
    const res = await fetch(WORKER_URL + path, {
      method:  opts.method || 'GET',
      headers: {
        'Authorization': 'Bearer ' + token,
        ...(opts.body ? { 'Content-Type': 'application/json' } : {}),
      },
      body: opts.body ? JSON.stringify(opts.body) : undefined,
    }).catch(() => null);
    if (!res) return { ok: false, data: { error: 'Could not reach server' } };
    const data = await res.json().catch(() => ({}));
    return { ok: res.ok, data };
  }

  function avatarLetter(user) {
    if (user.name) return user.name.trim()[0].toUpperCase();
    return (user.email || '?')[0].toUpperCase();
  }

  function displayName(user) {
    return user.name || user.email;
  }

  function renderUser(user) {
    currentUser = user;
    document.getElementById('avatarInitial').textContent = avatarLetter(user);
    document.getElementById('identityName').textContent  = displayName(user);
    document.getElementById('identityEmail').textContent = user.email;
    document.getElementById('roleBadge').textContent     = user.role === 'admin' ? 'Administrator' : 'Client';
    document.getElementById('navDisplay').textContent    = user.name || user.email;

    document.getElementById('inputName').value  = user.name || '';
    document.getElementById('inputEmail').value = user.email;

    if (user.hasPassword) {
      document.getElementById('passwordForm').classList.remove('hidden');
      document.getElementById('googleNote').classList.add('hidden');
    } else {
      document.getElementById('passwordForm').classList.add('hidden');
      document.getElementById('googleNote').classList.remove('hidden');
    }
  }

  function showMsg(idOk, idErr, isOk, text) {
    const ok  = document.getElementById(idOk);
    const err = document.getElementById(idErr);
    ok.classList.remove('show');
    err.classList.remove('show');
    if (isOk) { ok.textContent  = text; ok.classList.add('show'); }
    else       { err.textContent = text; err.classList.add('show'); }
  }

  // ── Profile form ─────────────────────────────────────────────────────────────
  document.getElementById('profileForm').addEventListener('submit', async e => {
    e.preventDefault();
    const btn  = document.getElementById('profileBtn');
    const name = document.getElementById('inputName').value.trim();

    btn.disabled    = true;
    btn.textContent = 'Saving…';

    const { ok, data } = await apiFetch('/auth/me', { method: 'PATCH', body: { name } });

    btn.disabled    = false;
    btn.textContent = 'Save Changes';

    if (!ok) {
      showMsg('profileOk', 'profileError', false, data.error || 'Save failed. Please try again.');
      return;
    }

    renderUser(data);
    localStorage.setItem(USER_KEY, JSON.stringify(data));
    showMsg('profileOk', 'profileError', true, 'Profile updated.');
  });

  // ── Password form ─────────────────────────────────────────────────────────────
  document.getElementById('pwForm').addEventListener('submit', async e => {
    e.preventDefault();
    const btn     = document.getElementById('pwBtn');
    const current = document.getElementById('inputCurrent').value;
    const newPw   = document.getElementById('inputNew').value;
    const confirm = document.getElementById('inputConfirm').value;

    if (newPw !== confirm) {
      showMsg('pwOk', 'pwError', false, 'New passwords do not match.');
      return;
    }

    btn.disabled    = true;
    btn.textContent = 'Updating…';

    const { ok, data } = await apiFetch('/auth/me', {
      method: 'PATCH',
      body:   { currentPassword: current, newPassword: newPw },
    });

    btn.disabled    = false;
    btn.textContent = 'Update Password';

    if (!ok) {
      showMsg('pwOk', 'pwError', false, data.error || 'Password update failed.');
      return;
    }

    document.getElementById('pwForm').reset();
    showMsg('pwOk', 'pwError', true, 'Password updated successfully.');
  });

  // ── Init ──────────────────────────────────────────────────────────────────────
  async function init() {
    const token = getToken();
    if (!token) {
      window.location.href = '/login.html?redirect=/profile.html';
      return;
    }

    const { ok, data } = await apiFetch('/auth/me');

    if (!ok) {
      localStorage.removeItem(JWT_KEY);
      localStorage.removeItem(USER_KEY);
      window.location.href = '/login.html?redirect=/profile.html';
      return;
    }

    renderUser(data);
    document.getElementById('loadingState').classList.add('hidden');
    document.getElementById('mainContent').classList.remove('hidden');
  }

  init();
</script>
</body>
</html>
