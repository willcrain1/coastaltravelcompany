<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Project Portal — Coastal Travel Company</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Gilda+Display&family=Pinyon+Script&family=Montserrat:wght@300;400;500;600&display=swap" rel="stylesheet" />
  <link rel="icon" href="favicon.svg" type="image/svg+xml" />
  <style>
    :root {
      --black: #1C1C1C;
      --green: #2A5C45;
      --teal:  #8FBFBE;
      --cream: #F4F1EC;
      --linen: #E8DDD0;
      --text:  #2C2C2C;
      --mid:   #5A5A5A;
    }
    *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      font-family: 'Montserrat', sans-serif;
      font-weight: 300;
      background: var(--cream);
      color: var(--text);
      min-height: 100vh;
    }
    header {
      background: var(--cream);
      border-bottom: 1px solid var(--linen);
      padding: 20px 48px;
      display: flex;
      align-items: center;
      justify-content: space-between;
    }
    .logo-main {
      display: block;
      font-family: 'Gilda Display', serif;
      font-size: 11px;
      letter-spacing: 0.28em;
      text-transform: uppercase;
      color: var(--black);
    }
    .logo-script {
      font-family: 'Pinyon Script', cursive;
      font-size: 26px;
      color: var(--green);
      line-height: 1;
    }
    .header-tagline {
      font-size: 11px;
      letter-spacing: 0.12em;
      color: var(--mid);
      text-transform: uppercase;
    }
    @media (max-width: 600px) {
      header { padding: 16px 20px; }
      .header-tagline { display: none; }
    }
    .pp-wrap {
      max-width: 800px;
      margin: 0 auto;
      padding: 48px 24px 80px;
    }
    .pp-hero {
      text-align: center;
      margin-bottom: 48px;
      padding-bottom: 32px;
      border-bottom: 1px solid #e8e8e8;
    }
    .pp-hero .brand-script {
      font-family: 'Pinyon Script', cursive;
      font-size: 1.8rem;
      color: var(--green);
      display: block;
      margin-bottom: 4px;
    }
    .pp-hero h1 {
      font-family: 'Gilda Display', serif;
      font-size: clamp(1.4rem, 4vw, 2rem);
      margin: 0 0 6px;
      color: var(--black);
    }
    .pp-hero .pp-meta {
      font-family: 'Montserrat', sans-serif;
      font-size: 0.85rem;
      color: #888;
    }

    /* Timeline */
    .pp-section-title {
      font-family: 'Montserrat', sans-serif;
      font-size: 0.75rem;
      font-weight: 600;
      letter-spacing: .1em;
      text-transform: uppercase;
      color: var(--green);
      margin: 0 0 20px;
    }
    .pp-section {
      margin-bottom: 48px;
    }
    .timeline {
      display: flex;
      flex-wrap: wrap;
      gap: 0;
      position: relative;
    }
    .tl-step {
      display: flex;
      flex-direction: column;
      align-items: center;
      flex: 1;
      min-width: 80px;
      position: relative;
    }
    .tl-step::before {
      content: '';
      position: absolute;
      top: 14px;
      left: 50%;
      right: -50%;
      height: 2px;
      background: #e0e0e0;
      z-index: 0;
    }
    .tl-step:last-child::before { display: none; }
    .tl-dot {
      width: 28px;
      height: 28px;
      border-radius: 50%;
      border: 2px solid #ddd;
      background: #fff;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 12px;
      z-index: 1;
      margin-bottom: 8px;
      transition: all .2s;
    }
    .tl-dot.done {
      background: var(--green);
      border-color: var(--green);
      color: #fff;
    }
    .tl-dot.active {
      background: #fff;
      border-color: var(--green);
      color: var(--green);
    }
    .tl-label {
      font-family: 'Montserrat', sans-serif;
      font-size: 0.68rem;
      color: #888;
      text-align: center;
      line-height: 1.3;
    }
    .tl-label.done  { color: var(--green); font-weight: 600; }
    .tl-label.active { color: var(--black); font-weight: 600; }

    /* Documents */
    .doc-grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(200px, 1fr));
      gap: 12px;
    }
    .doc-card {
      display: flex;
      flex-direction: column;
      gap: 6px;
      padding: 16px;
      border: 1px solid #e0e0e0;
      border-radius: 4px;
      text-decoration: none;
      transition: border-color .2s, background .2s;
    }
    .doc-card:hover { border-color: var(--green); background: #f8faf9; }
    .doc-type {
      font-family: 'Montserrat', sans-serif;
      font-size: 0.68rem;
      font-weight: 600;
      letter-spacing: .08em;
      text-transform: uppercase;
      color: var(--green);
    }
    .doc-name {
      font-family: 'Montserrat', sans-serif;
      font-size: 0.9rem;
      font-weight: 500;
      color: var(--black);
    }
    .doc-empty {
      font-family: 'Montserrat', sans-serif;
      font-size: 0.85rem;
      color: #aaa;
      font-style: italic;
    }

    /* Questionnaires */
    .qn-status-list {
      display: flex;
      flex-direction: column;
      gap: 10px;
    }
    .qn-status-item {
      display: flex;
      align-items: center;
      gap: 12px;
      padding: 12px 16px;
      border: 1px solid #e0e0e0;
      border-radius: 4px;
      font-family: 'Montserrat', sans-serif;
      font-size: 0.875rem;
    }
    .qn-status-badge {
      font-size: 0.7rem;
      font-weight: 600;
      letter-spacing: .06em;
      text-transform: uppercase;
      padding: 3px 8px;
      border-radius: 20px;
      white-space: nowrap;
    }
    .qn-status-badge.sent      { background: #fff3cd; color: #856404; }
    .qn-status-badge.completed { background: #d1f0e3; color: #145a35; }

    /* Messages */
    .msg-thread {
      display: flex;
      flex-direction: column;
      gap: 12px;
      margin-bottom: 24px;
      max-height: 400px;
      overflow-y: auto;
      padding: 4px 0;
    }
    .msg-item {
      display: flex;
      flex-direction: column;
      gap: 4px;
      max-width: 75%;
    }
    .msg-item.admin { align-self: flex-start; }
    .msg-item.client { align-self: flex-end; }
    .msg-bubble {
      padding: 12px 16px;
      border-radius: 16px;
      font-family: 'Montserrat', sans-serif;
      font-size: 0.875rem;
      line-height: 1.5;
    }
    .msg-item.admin  .msg-bubble { background: #f1f1f1; color: var(--black); border-bottom-left-radius: 4px; }
    .msg-item.client .msg-bubble { background: var(--green); color: #fff; border-bottom-right-radius: 4px; }
    .msg-meta {
      font-family: 'Montserrat', sans-serif;
      font-size: 0.7rem;
      color: #aaa;
    }
    .msg-item.client .msg-meta { text-align: right; }
    .msg-form {
      display: flex;
      flex-direction: column;
      gap: 10px;
    }
    .msg-form textarea {
      font-family: 'Montserrat', sans-serif;
      font-size: 0.875rem;
      padding: 12px 14px;
      border: 1px solid #ddd;
      border-radius: 4px;
      resize: vertical;
      min-height: 80px;
      width: 100%;
      box-sizing: border-box;
    }
    .msg-form textarea:focus { outline: none; border-color: var(--green); }
    .msg-send-btn {
      align-self: flex-end;
      font-family: 'Montserrat', sans-serif;
      font-size: 0.85rem;
      font-weight: 600;
      background: var(--green);
      color: #fff;
      border: none;
      padding: 10px 28px;
      border-radius: 2px;
      cursor: pointer;
      transition: opacity .2s;
    }
    .msg-send-btn:hover { opacity: .85; }
    .msg-send-btn:disabled { opacity: .5; cursor: not-allowed; }
    .msg-empty {
      font-family: 'Montserrat', sans-serif;
      font-size: 0.85rem;
      color: #aaa;
      font-style: italic;
      text-align: center;
      padding: 20px 0;
    }
    .pp-loading, .pp-error {
      text-align: center;
      padding: 80px 24px;
      font-family: 'Montserrat', sans-serif;
    }
    .pp-error { color: #c00; }
    .pp-loading { color: #888; }

    /* ── Portal tab nav ── */
    .portal-tab-nav {
      display: flex;
      border-bottom: 2px solid var(--linen);
      margin: 0 auto 40px;
      max-width: 800px;
      padding: 0 24px;
    }
    .portal-tab-link {
      font-family: 'Montserrat', sans-serif;
      font-size: 10px;
      font-weight: 600;
      letter-spacing: 0.28em;
      text-transform: uppercase;
      color: var(--mid);
      text-decoration: none;
      padding: 12px 20px;
      border-bottom: 2px solid transparent;
      margin-bottom: -2px;
      transition: color 0.2s, border-color 0.2s;
    }
    .portal-tab-link:hover { color: var(--green); }
    .portal-tab-link.active { color: var(--green); border-bottom-color: var(--green); }
  </style>
</head>
<body>

<header>
  <a href="/" style="text-decoration:none">
    <span class="logo-main">Coastal</span>
    <span class="logo-script">Travel Company</span>
  </a>
  <span class="header-tagline">Project Portal</span>
</header>

<main>
  <nav class="portal-tab-nav">
    <a class="portal-tab-link" id="accountTabLink" href="/portal.html">My Account</a>
    <a class="portal-tab-link active" href="#">My Project</a>
  </nav>

  <div id="ppLoading" class="pp-loading">Loading your project portal…</div>
  <div id="ppError"   class="pp-error"   style="display:none"></div>
  <div id="ppWrap"   class="pp-wrap"    style="display:none">

    <div class="pp-hero">
      <span class="brand-script">Coastal Travel Company</span>
      <h1 id="ppTitle">Your Project</h1>
      <div class="pp-meta" id="ppMeta"></div>
    </div>

    <!-- Timeline -->
    <div class="pp-section">
      <div class="pp-section-title">Project Timeline</div>
      <div class="timeline" id="ppTimeline"></div>
    </div>

    <!-- Documents -->
    <div class="pp-section">
      <div class="pp-section-title">Documents</div>
      <div class="doc-grid" id="ppDocs"></div>
    </div>

    <!-- Questionnaires -->
    <div class="pp-section" id="ppQnSection" style="display:none">
      <div class="pp-section-title">Questionnaires</div>
      <div class="qn-status-list" id="ppQnList"></div>
    </div>

    <!-- Messages -->
    <div class="pp-section">
      <div class="pp-section-title">Messages</div>
      <div class="msg-thread" id="ppMessages">
        <div class="msg-empty">No messages yet.</div>
      </div>
      <div class="msg-form">
        <textarea id="msgInput" placeholder="Type a message to Coastal Travel Company…"></textarea>
        <button class="msg-send-btn" id="msgSendBtn" onclick="sendMessage()">Send Message</button>
      </div>
    </div>

  </div>
</main>

<script src="config.js"></script>
<script>
  const WORKER_URL = CTC_CONFIG.workerUrl;
  const token = location.hash.slice(1);
  const isAdminPreview = new URLSearchParams(window.location.search).has('preview');
  let projectData = null;

  const STAGES = ['Inquiry','Proposal Sent','Contract Sent','Contract Signed','Retainer Paid','Active','Delivered','Complete'];

  function portalHref(path, hash = '') {
    return path + (isAdminPreview ? '?preview=1' : '') + hash;
  }

  function showAdminPreviewBanner() {
    const banner = document.createElement('div');
    banner.style.cssText = 'position:fixed;top:0;left:0;right:0;z-index:999;background:#f59e0b;color:#000;text-align:center;padding:7px 16px;font-family:Montserrat,sans-serif;font-size:10px;font-weight:600;letter-spacing:0.2em;text-transform:uppercase;';
    banner.innerHTML = 'Admin Preview &mdash; this is how clients see the portal &nbsp;&middot;&nbsp; <a href="/admin/galleries.html" style="color:#000;text-decoration:underline;">Back to Admin</a>';
    document.body.prepend(banner);
    document.querySelector('header').style.marginTop = '33px';
  }

  async function load() {
    if (!token) { showError('No portal link found. Please use the link from your email.'); return; }
    try {
      const jwt = localStorage.getItem('ctc_jwt');
      document.getElementById('accountTabLink').href = portalHref('/portal.html');

      if (isAdminPreview && jwt) {
        const meRes = await fetch(WORKER_URL + '/auth/me', {
          headers: { 'Authorization': 'Bearer ' + jwt },
        }).catch(() => null);
        if (meRes?.ok && (await meRes.json()).role === 'admin') showAdminPreviewBanner();
      }

      const headers = { Origin: location.origin };
      if (jwt) headers['Authorization'] = 'Bearer ' + jwt;
      const res = await fetch(WORKER_URL + '/portal/project/' + token, { headers });
      if (res.status === 401) {
        window.location.href = '/login.html?redirect=' + encodeURIComponent(location.href);
        return;
      }
      if (res.status === 403) {
        showError('This project portal is linked to a different account. Please sign in with the correct email address.');
        return;
      }
      if (res.status === 410) {
        showError('This project has been completed. The portal is no longer active.');
        return;
      }
      if (!res.ok) { showError('Portal not found. Please use the link you received by email.'); return; }
      projectData = await res.json();
      localStorage.setItem('ctc_project_token', token);
      render();
      hide('ppLoading'); show('ppWrap');
    } catch {
      showError('Unable to load your portal. Please try again.');
    }
  }

  function render() {
    const { project, documents, proposals, messages, questionnaires } = projectData;

    document.getElementById('ppTitle').textContent = project.property || project.client_name || 'Your Project';
    const meta = [project.collection, project.location, project.shoot_date ? 'Shoot: ' + fmtDate(project.shoot_date) : ''].filter(Boolean);
    document.getElementById('ppMeta').textContent = meta.join(' · ');

    renderTimeline(project.stage);
    renderDocs(documents, proposals);
    renderQuestionnaires(questionnaires);
    renderMessages(messages);

    if (project.stage === 'Complete') {
      document.querySelector('.msg-form').style.display = 'none';
      const note = document.createElement('p');
      note.style.cssText = 'font-family:Montserrat,sans-serif;font-size:0.8rem;color:#aaa;font-style:italic;text-align:center;padding:12px 0;';
      note.textContent = 'This project is complete — messaging is now closed.';
      document.getElementById('ppMessages').after(note);
    }
  }

  function renderTimeline(currentStage) {
    const stageIdx = STAGES.indexOf(currentStage);
    document.getElementById('ppTimeline').innerHTML = STAGES.map((s, i) => {
      const done   = i < stageIdx;
      const active = i === stageIdx;
      const cls    = done ? 'done' : active ? 'active' : '';
      const icon   = done ? '✓' : (i + 1).toString();
      return `<div class="tl-step">
        <div class="tl-dot ${cls}">${icon}</div>
        <div class="tl-label ${cls}">${esc(s)}</div>
      </div>`;
    }).join('');
  }

  function renderDocs(documents, proposals) {
    const el = document.getElementById('ppDocs');
    const items = [];
    for (const p of proposals) {
      if (p.status === 'approved') {
        items.push({ type: 'Proposal', name: 'Approved Proposal', url: p.public_url });
      } else {
        items.push({ type: 'Proposal', name: 'Proposal', url: p.public_url });
      }
    }
    for (const d of documents) {
      if (!proposals.find(p => p.public_url === d.url)) {
        items.push({ type: d.type, name: d.title, url: d.url });
      }
    }
    if (!items.length) {
      el.innerHTML = '<div class="doc-empty">No documents yet — they\'ll appear here once shared.</div>';
      return;
    }
    el.innerHTML = items.map(d => `
      <a class="doc-card" href="${esc(d.url)}" target="_blank" rel="noopener">
        <span class="doc-type">${esc(d.type)}</span>
        <span class="doc-name">${esc(d.name)}</span>
      </a>`).join('');
  }

  function renderQuestionnaires(questionnaires) {
    if (!questionnaires?.length) return;
    show('ppQnSection');
    document.getElementById('ppQnList').innerHTML = questionnaires.map(q => `
      <div class="qn-status-item">
        <span class="qn-status-badge ${q.status}">${esc(q.status)}</span>
        <span style="font-weight:500">${esc(q.phase === 'post-booking' ? 'Post-Booking Questionnaire' : 'Pre-Booking Questionnaire')}</span>
        <span style="color:#aaa;font-size:0.8rem;margin-left:auto">${esc(q.status === 'completed' ? 'Completed ' + relTime(q.completed_at) : 'Sent ' + relTime(q.sent_at))}</span>
        ${q.status === 'sent' ? `<a href="${WORKER_URL.replace('/api','')}/questionnaire.html#${esc(q.magic_token || '')}" style="color:var(--green);font-size:0.85rem;white-space:nowrap" target="_blank">Complete →</a>` : ''}
      </div>`).join('');
  }

  function renderMessages(messages) {
    const el = document.getElementById('ppMessages');
    if (!messages?.length) return;
    el.innerHTML = messages.map(m => `
      <div class="msg-item ${m.sender}">
        <div class="msg-bubble">${esc(m.content)}</div>
        <div class="msg-meta">${esc(m.sender === 'admin' ? 'Coastal Travel Company' : m.sender_name)} · ${esc(relTime(m.created_at))}</div>
      </div>`).join('');
    el.scrollTop = el.scrollHeight;
  }

  async function sendMessage() {
    const input = document.getElementById('msgInput');
    const btn   = document.getElementById('msgSendBtn');
    const content = input.value.trim();
    if (!content) return;
    btn.disabled = true;
    try {
      const jwt = localStorage.getItem('ctc_jwt');
      const msgHeaders = { 'Content-Type': 'application/json', Origin: location.origin };
      if (jwt) msgHeaders['Authorization'] = 'Bearer ' + jwt;
      const res = await fetch(WORKER_URL + '/portal/project/' + token, {
        method: 'POST',
        headers: msgHeaders,
        body: JSON.stringify({ content }),
      });
      if (res.ok) {
        const msg = await res.json();
        projectData.messages = [...(projectData.messages || []), msg];
        renderMessages(projectData.messages);
        input.value = '';
      } else {
        alert('Failed to send message. Please try again.');
      }
    } catch {
      alert('Network error. Please try again.');
    }
    btn.disabled = false;
  }

  function showError(msg) {
    hide('ppLoading');
    const el = document.getElementById('ppError');
    el.textContent = msg;
    el.style.display = '';
  }
  function show(id) { document.getElementById(id).style.display = ''; }
  function hide(id) { document.getElementById(id).style.display = 'none'; }
  function esc(s) { return String(s || '').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;'); }
  function relTime(iso) {
    if (!iso) return '';
    const m = Math.floor((Date.now() - new Date(iso)) / 60000);
    if (m < 2) return 'just now';
    if (m < 60) return m + 'm ago';
    const h = Math.floor(m / 60);
    if (h < 24) return h + 'h ago';
    const d = Math.floor(h / 24);
    return d + 'd ago';
  }
  function fmtDate(iso) {
    if (!iso) return '';
    return new Date(iso + 'T00:00:00').toLocaleDateString('en-US', { month: 'short', day: 'numeric', year: 'numeric' });
  }
  load();
</script>
</body>
</html>
