<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Sign Contract — Coastal Travel Company</title>
  <link rel="icon" href="favicon.svg" type="image/svg+xml" />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Gilda+Display&family=Pinyon+Script&family=Montserrat:wght@300;400;500;600&display=swap" rel="stylesheet" />
  <style>
    :root {
      --black:  #1C1C1C;
      --green:  #2A5C45;
      --teal:   #8FBFBE;
      --cream:  #F4F1EC;
      --linen:  #E8DDD0;
      --dim:    #888;
    }
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      background: var(--cream);
      color: var(--black);
      font-family: 'Montserrat', sans-serif;
      font-weight: 300;
      min-height: 100vh;
    }

    /* ── Header ── */
    header {
      background: var(--black);
      padding: 18px 32px;
      display: flex;
      align-items: center;
      gap: 12px;
    }
    .logo-main   { font-family: 'Gilda Display', serif; color: #fff; font-size: 1.15rem; letter-spacing: .04em; }
    .logo-script { font-family: 'Pinyon Script', cursive; color: var(--teal); font-size: 1.4rem; margin-left: 4px; }

    /* ── Page layout ── */
    .page { max-width: 780px; margin: 0 auto; padding: 40px 24px 80px; }

    /* ── Loading / error states ── */
    .state-msg {
      text-align: center;
      padding: 60px 24px;
      font-size: 0.95rem;
      color: var(--dim);
    }

    /* ── Contract body card ── */
    .contract-card {
      background: #fff;
      border: 1px solid var(--linen);
      border-radius: 4px;
      padding: 48px 52px;
      margin-bottom: 32px;
      position: relative;
    }
    @media (max-width: 600px) {
      .contract-card { padding: 28px 20px; }
    }

    .contract-header {
      text-align: center;
      margin-bottom: 40px;
      padding-bottom: 32px;
      border-bottom: 1px solid var(--linen);
    }
    .contract-header .brand { font-family: 'Pinyon Script', cursive; font-size: 2rem; color: var(--green); }
    .contract-title { font-family: 'Gilda Display', serif; font-size: 1.4rem; margin-top: 12px; }
    .contract-date  { font-size: 0.82rem; color: var(--dim); margin-top: 6px; }

    .contract-body {
      font-size: 0.875rem;
      line-height: 1.8;
      color: #333;
    }
    .contract-body h2, .contract-body h3 {
      font-family: 'Gilda Display', serif;
      font-weight: 400;
      margin: 28px 0 10px;
      color: var(--black);
    }
    .contract-body h2 { font-size: 1.05rem; }
    .contract-body h3 { font-size: 0.95rem; }
    .contract-body p  { margin-bottom: 12px; }
    .contract-body ul, .contract-body ol { margin: 8px 0 12px 20px; }
    .contract-body li { margin-bottom: 4px; }

    /* ── Scroll notice ── */
    .scroll-notice {
      background: #fff8e1;
      border: 1px solid #ffe082;
      border-radius: 4px;
      padding: 14px 18px;
      font-size: 0.82rem;
      color: #5d4037;
      margin-bottom: 24px;
      display: flex;
      align-items: center;
      gap: 10px;
    }
    .scroll-notice svg { flex-shrink: 0; }

    /* ── Signature section ── */
    .sig-section {
      background: #fff;
      border: 1px solid var(--linen);
      border-radius: 4px;
      padding: 32px;
      margin-bottom: 24px;
    }
    .sig-section h3 {
      font-family: 'Gilda Display', serif;
      font-size: 1.1rem;
      font-weight: 400;
      margin-bottom: 20px;
    }

    /* Signature tabs */
    .sig-tabs { display: flex; gap: 0; margin-bottom: 20px; border: 1px solid var(--linen); border-radius: 4px; overflow: hidden; }
    .sig-tab {
      flex: 1; padding: 10px 14px; font-family: 'Montserrat', sans-serif;
      font-size: 0.78rem; font-weight: 500; letter-spacing: .05em; text-transform: uppercase;
      border: none; background: #fff; cursor: pointer; color: var(--dim);
      border-right: 1px solid var(--linen); transition: background .15s, color .15s;
    }
    .sig-tab:last-child { border-right: none; }
    .sig-tab.active { background: var(--green); color: #fff; }

    /* Type signature */
    .sig-typed-wrap { position: relative; }
    .sig-typed-input {
      width: 100%; padding: 14px 16px; font-size: 1rem;
      border: 1px solid var(--linen); border-radius: 4px;
      font-family: 'Montserrat', sans-serif; background: var(--cream);
    }
    .sig-typed-preview {
      margin-top: 12px; padding: 20px; background: #fff;
      border: 1px dashed var(--linen); border-radius: 4px;
      font-family: 'Pinyon Script', cursive; font-size: 2.2rem;
      color: var(--black); min-height: 80px; text-align: center;
      line-height: 1.2;
    }

    /* Draw signature */
    .sig-canvas-wrap {
      border: 1px solid var(--linen); border-radius: 4px;
      background: #fff; cursor: crosshair; touch-action: none;
      display: block; width: 100%;
    }
    canvas.sig-canvas-wrap { height: 160px; }
    .sig-canvas-actions { display: flex; gap: 8px; margin-top: 8px; }

    /* Upload signature */
    .sig-upload-area {
      border: 2px dashed var(--linen); border-radius: 4px; padding: 32px;
      text-align: center; cursor: pointer; background: #fff;
      transition: border-color .2s, background .2s;
    }
    .sig-upload-area:hover { border-color: var(--teal); background: #f9f9f9; }
    .sig-upload-area input { display: none; }
    .sig-upload-preview { max-height: 100px; margin: 0 auto; display: block; }
    .sig-upload-text { font-size: 0.82rem; color: var(--dim); margin-top: 6px; }

    /* Agree checkbox */
    .agree-row {
      display: flex; align-items: flex-start; gap: 12px;
      margin: 24px 0; font-size: 0.85rem; line-height: 1.6;
    }
    .agree-row input[type="checkbox"] { width: 18px; height: 18px; margin-top: 2px; flex-shrink: 0; accent-color: var(--green); cursor: pointer; }

    /* Buttons */
    .btn {
      display: inline-flex; align-items: center; justify-content: center;
      padding: 12px 28px; font-family: 'Montserrat', sans-serif;
      font-size: 0.8rem; font-weight: 600; letter-spacing: .08em; text-transform: uppercase;
      border: none; border-radius: 2px; cursor: pointer; transition: opacity .15s;
      text-decoration: none;
    }
    .btn:hover   { opacity: .85; }
    .btn-primary { background: var(--green); color: #fff; }
    .btn-ghost   { background: transparent; color: var(--black); border: 1px solid var(--linen); }
    .btn:disabled { opacity: .4; cursor: not-allowed; }

    /* Status banners */
    .banner {
      border-radius: 4px; padding: 20px 24px;
      font-size: 0.875rem; line-height: 1.7; margin-bottom: 28px;
    }
    .banner-success { background: #d1f0e3; border: 1px solid #a3d9c2; color: #145a35; }
    .banner-waiting { background: #fff8e1; border: 1px solid #ffe082; color: #5d4037; }
    .banner-info    { background: #e8f4fd; border: 1px solid #b3d9f5; color: #1565c0; }

    /* Signature display (executed) */
    .sig-display {
      font-family: 'Pinyon Script', cursive;
      font-size: 2rem; color: var(--black);
      padding: 16px; background: var(--cream);
      border-radius: 4px; text-align: center;
    }
    .sig-display img { max-height: 80px; display: block; margin: 0 auto; }

    /* Audit trail */
    .audit-section { margin-top: 40px; }
    .audit-title {
      font-family: 'Gilda Display', serif; font-size: 1rem;
      font-weight: 400; margin-bottom: 16px;
      padding-bottom: 8px; border-bottom: 1px solid var(--linen);
    }
    .audit-item {
      display: flex; gap: 16px; padding: 12px 0;
      border-bottom: 1px solid var(--linen); font-size: 0.78rem;
    }
    .audit-item:last-child { border-bottom: none; }
    .audit-event { font-weight: 600; min-width: 130px; }
    .audit-meta  { color: var(--dim); }

    /* Print-optimised */
    @media print {
      header, .sig-section, .scroll-notice, .btn, .sig-tabs, .sig-canvas-actions { display: none !important; }
      body { background: #fff; }
      .contract-card { border: none; padding: 0; margin: 0; box-shadow: none; }
      .page { padding: 0; }
    }
  </style>
</head>
<body>

<header>
  <span class="logo-main">Coastal</span>
  <span class="logo-script">Travel Company</span>
</header>

<div class="page">
  <div id="appState" class="state-msg">Loading contract…</div>

  <div id="contractWrap" style="display:none;">

    <!-- Scroll notice (hidden once scrolled) -->
    <div class="scroll-notice" id="scrollNotice">
      <svg width="18" height="18" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><circle cx="12" cy="12" r="10"/><line x1="12" y1="8" x2="12" y2="12"/><circle cx="12" cy="16" r=".5" fill="currentColor"/></svg>
      Please scroll through the entire contract before signing.
    </div>

    <!-- Contract document -->
    <div class="contract-card" id="contractCard">
      <div class="contract-header">
        <div class="brand">Coastal Travel Company</div>
        <div class="contract-title" id="contractTitle"></div>
        <div class="contract-date" id="contractDate"></div>
      </div>
      <div class="contract-body" id="contractBody"></div>
    </div>

    <!-- Signature block (shown only when status = 'sent') -->
    <div id="sigBlock" style="display:none;">
      <div class="sig-section">
        <h3>Sign this contract</h3>

        <div class="sig-tabs">
          <button class="sig-tab active" onclick="setSigMode('type',this)">Type Name</button>
          <button class="sig-tab" onclick="setSigMode('draw',this)">Draw</button>
          <button class="sig-tab" onclick="setSigMode('upload',this)">Upload Image</button>
        </div>

        <!-- Type name -->
        <div id="sigModeType">
          <div class="sig-typed-wrap">
            <input class="sig-typed-input" type="text" id="sigTypedInput" placeholder="Type your full name" oninput="updateTypedPreview()" />
          </div>
          <div class="sig-typed-preview" id="sigTypedPreview"></div>
        </div>

        <!-- Draw -->
        <div id="sigModeDraw" style="display:none;">
          <canvas id="sigCanvas" class="sig-canvas-wrap" width="700" height="160"></canvas>
          <div class="sig-canvas-actions">
            <button class="btn btn-ghost" style="padding:8px 18px;font-size:0.75rem;" onclick="clearCanvas()">Clear</button>
          </div>
        </div>

        <!-- Upload -->
        <div id="sigModeUpload" style="display:none;">
          <div class="sig-upload-area" onclick="document.getElementById('sigUploadInput').click()">
            <input type="file" id="sigUploadInput" accept="image/*" onchange="handleUpload(event)" />
            <div id="sigUploadPreviewWrap">
              <svg width="32" height="32" fill="none" stroke="var(--dim)" stroke-width="1.5" viewBox="0 0 24 24" style="margin:0 auto 8px;display:block;"><path d="M21 15v4a2 2 0 01-2 2H5a2 2 0 01-2-2v-4"/><polyline points="17 8 12 3 7 8"/><line x1="12" y1="3" x2="12" y2="15"/></svg>
              <div class="sig-upload-text">Click to upload signature image (PNG, JPG)</div>
            </div>
          </div>
        </div>

        <div class="agree-row">
          <input type="checkbox" id="agreeCheck" onchange="updateSubmitBtn()" />
          <label for="agreeCheck">
            I have read and agree to the terms of this contract. By checking this box and clicking "I Agree &amp; Sign", I intend this to be my legally binding electronic signature.
          </label>
        </div>

        <button class="btn btn-primary" id="submitBtn" onclick="submitSignature()" disabled>
          I Agree &amp; Sign
        </button>
      </div>
    </div>

    <!-- Status banners (shown after signing) -->
    <div id="statusBanner" style="display:none;"></div>

    <!-- Signature display (shown when executed) -->
    <div id="sigsDisplay" style="display:none;"></div>

    <!-- Audit trail (shown when executed) -->
    <div id="auditTrail" style="display:none;"></div>

    <!-- Print / download -->
    <div id="printBar" style="display:none; margin-top:24px; display:flex; gap:12px;">
      <button class="btn btn-ghost" onclick="window.print()">Print / Download PDF</button>
      <button class="btn btn-ghost" id="downloadArchiveBtn" onclick="downloadArchive()">Download Signed Contract</button>
    </div>

  </div>
</div>

<script src="config.js"></script>
<script>
  const WORKER_URL = CTC_CONFIG.workerUrl;
  const token  = location.hash.slice(1);
  let contract = null;
  let sigMode  = 'type';
  let hasScrolled = false;
  let canvasDrawing = false;
  let canvasCtx   = null;
  let lastX = 0, lastY = 0;
  let canvasHasContent = false;
  let uploadedDataUrl  = null;

  function esc(s) {
    return String(s || '').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
  }

  function fmtDate(iso) {
    if (!iso) return '';
    try { return new Date(iso).toLocaleDateString('en-US', { year:'numeric', month:'long', day:'numeric' }); }
    catch { return iso; }
  }

  function fmtDateTime(iso) {
    if (!iso) return '';
    try { return new Date(iso).toLocaleString('en-US', { year:'numeric', month:'short', day:'numeric', hour:'numeric', minute:'2-digit', hour12:true, timeZoneName:'short' }); }
    catch { return iso; }
  }

  // ── Load contract ──────────────────────────────────────────────────────────

  async function loadContract() {
    if (!token) { showError('No contract token in URL.'); return; }
    try {
      const res = await fetch(WORKER_URL + '/contracts/' + token, { headers: { Origin: location.origin } });
      if (!res.ok) { const j = await res.json().catch(() => ({})); showError(j.error || 'Contract not found.'); return; }
      contract = await res.json();
    } catch {
      showError('Could not load contract. Please try again.');
      return;
    }
    renderContract();
    // Log view event (fire-and-forget)
    fetch(WORKER_URL + '/contracts/' + token + '/view', { method:'POST', headers:{ Origin: location.origin } }).catch(() => {});
  }

  function showError(msg) {
    document.getElementById('appState').innerHTML =
      `<svg width="40" height="40" fill="none" stroke="var(--dim)" stroke-width="1.5" viewBox="0 0 24 24" style="margin:0 auto 16px;display:block;"><circle cx="12" cy="12" r="10"/><line x1="15" y1="9" x2="9" y2="15"/><line x1="9" y1="9" x2="15" y2="15"/></svg>${esc(msg)}`;
  }

  function renderContract() {
    document.getElementById('appState').style.display = 'none';
    document.getElementById('contractWrap').style.display = '';

    document.getElementById('contractTitle').textContent = contract.title;
    document.getElementById('contractDate').textContent  = 'Prepared ' + fmtDate(contract.created_at);

    // Render body: treat as plain text with paragraph detection, or as HTML if it starts with '<'
    const body = contract.body || '';
    const bodyEl = document.getElementById('contractBody');
    if (body.trimStart().startsWith('<')) {
      bodyEl.innerHTML = body; // trust admin-authored HTML
    } else {
      // Convert plain text: blank line = new paragraph, markdown headings
      bodyEl.innerHTML = body
        .replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;')
        .replace(/^### (.+)$/gm, '<h3>$1</h3>')
        .replace(/^## (.+)$/gm,  '<h2>$1</h2>')
        .replace(/^# (.+)$/gm,   '<h2>$1</h2>')
        .replace(/\*\*(.+?)\*\*/g, '<strong>$1</strong>')
        .split(/\n{2,}/).map(p => `<p>${p.replace(/\n/g,'<br>')}</p>`).join('');
    }

    if (contract.status === 'sent') {
      setupScrollGate();
      document.getElementById('sigBlock').style.display = '';
    } else if (contract.status === 'client_signed') {
      document.getElementById('scrollNotice').style.display = 'none';
      document.getElementById('statusBanner').style.display = '';
      document.getElementById('statusBanner').innerHTML =
        `<div class="banner banner-waiting"><strong>Awaiting admin signature.</strong> You have signed this contract. The Coastal Travel Company team will countersign shortly and you will receive an email confirmation.</div>`;
    } else if (contract.status === 'fully_executed') {
      document.getElementById('scrollNotice').style.display = 'none';
      document.getElementById('statusBanner').style.display = '';
      document.getElementById('statusBanner').innerHTML =
        `<div class="banner banner-success"><strong>Contract fully executed.</strong> Both parties have signed this contract. This page serves as a permanent record.</div>`;
      renderSignatureDisplay();
      loadAuditTrail();
      document.getElementById('printBar').style.display = 'flex';
    }

    initCanvas();
  }

  // ── Scroll gate ────────────────────────────────────────────────────────────

  function setupScrollGate() {
    const card = document.getElementById('contractCard');
    const notice = document.getElementById('scrollNotice');

    function checkScroll() {
      const rect = card.getBoundingClientRect();
      // Consider scrolled when bottom of card is near or past the viewport
      if (rect.bottom <= window.innerHeight + 80) {
        hasScrolled = true;
        notice.style.display = 'none';
        updateSubmitBtn();
        window.removeEventListener('scroll', checkScroll);
        card.removeEventListener('scroll', checkScroll);
      }
    }
    window.addEventListener('scroll', checkScroll, { passive: true });
    // Also check immediately (short contracts)
    checkScroll();
  }

  // ── Signature modes ─────────────────────────────────────────────────────────

  function setSigMode(mode, btn) {
    sigMode = mode;
    document.querySelectorAll('.sig-tab').forEach(t => t.classList.remove('active'));
    btn.classList.add('active');
    document.getElementById('sigModeType').style.display   = mode === 'type'   ? '' : 'none';
    document.getElementById('sigModeDraw').style.display   = mode === 'draw'   ? '' : 'none';
    document.getElementById('sigModeUpload').style.display = mode === 'upload' ? '' : 'none';
    updateSubmitBtn();
  }

  function updateTypedPreview() {
    const val = document.getElementById('sigTypedInput').value;
    document.getElementById('sigTypedPreview').textContent = val;
    updateSubmitBtn();
  }

  function updateSubmitBtn() {
    const agreed  = document.getElementById('agreeCheck').checked;
    const hasSig  = getSignatureData() !== null;
    const btn     = document.getElementById('submitBtn');
    btn.disabled  = !(agreed && hasSig && hasScrolled);
  }

  function getSignatureData() {
    if (sigMode === 'type') {
      const val = (document.getElementById('sigTypedInput').value || '').trim();
      return val ? val : null;
    }
    if (sigMode === 'draw') {
      return canvasHasContent ? document.getElementById('sigCanvas').toDataURL('image/png') : null;
    }
    if (sigMode === 'upload') {
      return uploadedDataUrl || null;
    }
    return null;
  }

  // ── Canvas drawing ──────────────────────────────────────────────────────────

  function initCanvas() {
    const canvas = document.getElementById('sigCanvas');
    if (!canvas) return;
    // Resize to actual rendered width
    const resize = () => {
      const w = canvas.parentElement.clientWidth;
      const saved = canvasHasContent ? canvas.toDataURL() : null;
      canvas.width  = w;
      canvas.height = 160;
      canvasCtx = canvas.getContext('2d');
      canvasCtx.strokeStyle = '#1C1C1C';
      canvasCtx.lineWidth   = 2.5;
      canvasCtx.lineCap     = 'round';
      canvasCtx.lineJoin    = 'round';
      if (saved) {
        const img = new Image(); img.src = saved;
        img.onload = () => canvasCtx.drawImage(img, 0, 0);
      }
    };
    resize();
    window.addEventListener('resize', resize);

    function getPos(e, canvas) {
      const r = canvas.getBoundingClientRect();
      const src = e.touches ? e.touches[0] : e;
      return { x: (src.clientX - r.left) * (canvas.width / r.width), y: (src.clientY - r.top) * (canvas.height / r.height) };
    }

    canvas.addEventListener('mousedown', e => {
      canvasDrawing = true;
      const { x, y } = getPos(e, canvas);
      lastX = x; lastY = y;
      canvasCtx.beginPath();
      canvasCtx.moveTo(x, y);
    });
    canvas.addEventListener('mousemove', e => {
      if (!canvasDrawing) return;
      const { x, y } = getPos(e, canvas);
      canvasCtx.lineTo(x, y);
      canvasCtx.stroke();
      lastX = x; lastY = y;
      canvasHasContent = true;
      updateSubmitBtn();
    });
    canvas.addEventListener('mouseup',   () => { canvasDrawing = false; });
    canvas.addEventListener('mouseleave',() => { canvasDrawing = false; });
    canvas.addEventListener('touchstart', e => {
      e.preventDefault();
      canvasDrawing = true;
      const { x, y } = getPos(e, canvas);
      lastX = x; lastY = y;
      canvasCtx.beginPath();
      canvasCtx.moveTo(x, y);
    }, { passive: false });
    canvas.addEventListener('touchmove', e => {
      e.preventDefault();
      if (!canvasDrawing) return;
      const { x, y } = getPos(e, canvas);
      canvasCtx.lineTo(x, y);
      canvasCtx.stroke();
      canvasHasContent = true;
      updateSubmitBtn();
    }, { passive: false });
    canvas.addEventListener('touchend',  () => { canvasDrawing = false; });
  }

  function clearCanvas() {
    const canvas = document.getElementById('sigCanvas');
    canvasCtx.clearRect(0, 0, canvas.width, canvas.height);
    canvasHasContent = false;
    updateSubmitBtn();
  }

  // ── Upload ──────────────────────────────────────────────────────────────────

  function handleUpload(e) {
    const file = e.target.files[0];
    if (!file) return;
    const reader = new FileReader();
    reader.onload = ev => {
      uploadedDataUrl = ev.target.result;
      const wrap = document.getElementById('sigUploadPreviewWrap');
      wrap.innerHTML = `<img class="sig-upload-preview" src="${esc(uploadedDataUrl)}" alt="Signature" />
        <div class="sig-upload-text" style="margin-top:8px;">Click to replace</div>`;
      updateSubmitBtn();
    };
    reader.readAsDataURL(file);
  }

  // ── Submit ──────────────────────────────────────────────────────────────────

  async function submitSignature() {
    const sigData = getSignatureData();
    if (!sigData || !document.getElementById('agreeCheck').checked) return;
    const btn = document.getElementById('submitBtn');
    btn.disabled = true;
    btn.textContent = 'Signing…';
    try {
      const res = await fetch(WORKER_URL + '/contracts/' + token + '/sign', {
        method:  'POST',
        headers: { 'Content-Type': 'application/json', Origin: location.origin },
        body:    JSON.stringify({ signature: sigData, signature_type: sigMode }),
      });
      const data = await res.json();
      if (!res.ok) { toast(data.error || 'Signing failed. Please try again.', true); btn.disabled = false; btn.textContent = 'I Agree & Sign'; return; }
      // Success
      document.getElementById('sigBlock').style.display = 'none';
      document.getElementById('scrollNotice').style.display = 'none';
      document.getElementById('statusBanner').style.display = '';
      document.getElementById('statusBanner').innerHTML =
        `<div class="banner banner-success"><strong>Thank you — you have signed this contract.</strong> Coastal Travel Company will countersign shortly and you will receive an email confirmation with a permanent link to the fully executed contract.</div>`;
      contract.status = 'client_signed';
    } catch {
      toast('Network error. Please try again.', true);
      btn.disabled = false;
      btn.textContent = 'I Agree & Sign';
    }
  }

  // ── Fully executed display ──────────────────────────────────────────────────

  function renderSignatureDisplay() {
    const wrap = document.getElementById('sigsDisplay');
    wrap.style.display = '';
    wrap.innerHTML = `
      <div style="display:grid;grid-template-columns:1fr 1fr;gap:20px;margin-bottom:24px;">
        <div class="sig-section" style="margin-bottom:0;">
          <div style="font-size:0.75rem;font-weight:600;letter-spacing:.08em;text-transform:uppercase;color:var(--dim);margin-bottom:10px;">Client Signature</div>
          ${renderSigValue(contract.client_signature, contract.client_signature_type)}
          <div style="font-size:0.75rem;color:var(--dim);margin-top:8px;">Signed ${fmtDateTime(contract.client_signed_at)}</div>
        </div>
        <div class="sig-section" style="margin-bottom:0;">
          <div style="font-size:0.75rem;font-weight:600;letter-spacing:.08em;text-transform:uppercase;color:var(--dim);margin-bottom:10px;">Coastal Travel Company</div>
          ${renderSigValue(contract.admin_signature, contract.admin_signature_type)}
          <div style="font-size:0.75rem;color:var(--dim);margin-top:8px;">Signed ${fmtDateTime(contract.admin_signed_at)}</div>
        </div>
      </div>`;
  }

  function renderSigValue(sig, type) {
    if (!sig) return '<div class="sig-display" style="color:var(--dim);font-family:\'Montserrat\',sans-serif;font-size:0.8rem;">—</div>';
    if (type === 'type') return `<div class="sig-display">${esc(sig)}</div>`;
    if (type === 'draw' || type === 'uploaded' || type === 'upload')
      return `<div class="sig-display"><img src="${esc(sig)}" alt="Signature" /></div>`;
    return `<div class="sig-display">${esc(sig)}</div>`;
  }

  // ── Audit trail ────────────────────────────────────────────────────────────

  async function loadAuditTrail() {
    try {
      const res = await fetch(WORKER_URL + '/contracts/' + token + '/audit', { headers: { Origin: location.origin } });
      if (!res.ok) return;
      const { events } = await res.json();
      if (!events?.length) return;
      const wrap = document.getElementById('auditTrail');
      wrap.style.display = '';
      wrap.innerHTML = `
        <div class="contract-card" style="margin-top:32px;">
          <div class="audit-title">Certificate of Completion</div>
          <p style="font-size:0.82rem;color:var(--dim);margin-bottom:16px;">This certificate records all signing events and serves as the legal audit trail for this agreement.</p>
          ${events.map(e => `
            <div class="audit-item">
              <div class="audit-event">${esc(labelEvent(e.event_type))}</div>
              <div class="audit-meta">
                ${e.actor_email ? esc(e.actor_email) + ' · ' : ''}
                ${fmtDateTime(e.created_at)}<br>
                ${e.ip_address ? 'IP: ' + esc(e.ip_address) + ' · ' : ''}
                Document hash: <code style="font-size:0.7rem;">${esc((e.body_hash || '').slice(0,16))}…</code>
              </div>
            </div>`).join('')}
        </div>`;
    } catch { /* ignore */ }
  }

  function labelEvent(type) {
    return { created: 'Contract created', viewed: 'Document viewed', client_signed: 'Client signed', admin_countersigned: 'Admin countersigned', pdf_generated: 'PDF generated' }[type] || type;
  }

  // ── Archive download ───────────────────────────────────────────────────────

  async function downloadArchive() {
    const btn = document.getElementById('downloadArchiveBtn');
    btn.disabled = true;
    btn.textContent = 'Downloading…';
    try {
      const res = await fetch(WORKER_URL + '/contracts/' + token + '/archive', { headers: { Origin: location.origin } });
      if (!res.ok) { toast('Archive not available yet. Try again later.', true); return; }
      const blob = await res.blob();
      const url  = URL.createObjectURL(blob);
      const a    = document.createElement('a');
      a.href     = url;
      a.download = 'signed-contract.html';
      a.click();
      URL.revokeObjectURL(url);
    } catch { toast('Download failed. Please try again.', true); }
    finally { btn.disabled = false; btn.textContent = 'Download Signed Contract'; }
  }

  // ── Toast ──────────────────────────────────────────────────────────────────

  function toast(msg, isErr) {
    let t = document.getElementById('toast');
    if (!t) { t = document.createElement('div'); t.id = 'toast'; document.body.appendChild(t); }
    t.textContent = msg;
    t.style.cssText = `position:fixed;bottom:24px;left:50%;transform:translateX(-50%);background:${isErr?'#c0392b':'#2A5C45'};color:#fff;padding:12px 24px;border-radius:4px;font-family:Montserrat,sans-serif;font-size:0.82rem;font-weight:500;z-index:999;opacity:1;transition:opacity .4s`;
    clearTimeout(t._to);
    t._to = setTimeout(() => { t.style.opacity = '0'; }, 3000);
  }

  loadContract();
</script>

</body>
</html>
