<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Content Editor — Admin</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Gilda+Display&family=Pinyon+Script&family=Montserrat:ital,wght@0,300;0,400;0,500;0,600;1,300&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="admin.css?v=2" />
  <script src="../config.js"></script>
  <style>
    .cms-layout {
      display: flex;
      min-height: calc(100vh - 64px);
    }

    /* ── Sidebar ── */
    .cms-sidebar {
      width: 220px;
      flex-shrink: 0;
      background: #1a1a1a;
      border-right: 1px solid rgba(255,255,255,0.07);
      padding: 32px 0;
    }
    .cms-sidebar h3 {
      font-size: 9px;
      font-weight: 600;
      letter-spacing: 0.35em;
      text-transform: uppercase;
      color: rgba(255,255,255,0.35);
      padding: 0 24px 16px;
      margin: 0;
    }
    .cms-sidebar ul {
      list-style: none;
      margin: 0;
      padding: 0;
    }
    .cms-sidebar li a {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 12px 24px;
      color: rgba(255,255,255,0.55);
      text-decoration: none;
      font-size: 13px;
      font-family: 'Montserrat', sans-serif;
      font-weight: 400;
      transition: background 0.15s, color 0.15s;
      cursor: pointer;
    }
    .cms-sidebar li a:hover,
    .cms-sidebar li a.active {
      background: rgba(255,255,255,0.06);
      color: #fff;
    }
    .cms-sidebar li a .badge {
      font-size: 9px;
      background: rgba(255,255,255,0.1);
      color: rgba(255,255,255,0.4);
      border-radius: 10px;
      padding: 2px 7px;
    }
    .cms-sidebar li a.active .badge {
      background: rgba(143,191,190,0.2);
      color: #8fbfbe;
    }

    /* ── Main content ── */
    .cms-main {
      flex: 1;
      background: #f9f8f6;
      overflow-y: auto;
    }
    .cms-empty {
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      height: 100%;
      color: #aaa;
      gap: 12px;
    }
    .cms-empty svg { opacity: 0.3; }
    .cms-empty p { font-size: 14px; margin: 0; }

    /* ── Editor header ── */
    .cms-editor-header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 28px 40px;
      background: #fff;
      border-bottom: 1px solid rgba(0,0,0,0.07);
      position: sticky;
      top: 0;
      z-index: 10;
    }
    .cms-editor-header h2 {
      font-family: 'Gilda Display', serif;
      font-size: 22px;
      color: #1c1c1c;
      margin: 0;
    }
    .cms-editor-header .subtitle {
      font-size: 11px;
      color: #999;
      margin-top: 2px;
    }
    .cms-actions {
      display: flex;
      gap: 12px;
      align-items: center;
    }
    .cms-btn {
      padding: 10px 22px;
      font-family: 'Montserrat', sans-serif;
      font-size: 10px;
      font-weight: 600;
      letter-spacing: 0.12em;
      text-transform: uppercase;
      border: none;
      border-radius: 2px;
      cursor: pointer;
      transition: background 0.2s, opacity 0.2s;
    }
    .cms-btn-outline {
      background: transparent;
      border: 1px solid rgba(0,0,0,0.18);
      color: #555;
    }
    .cms-btn-outline:hover { background: #f0f0f0; }
    .cms-btn-primary {
      background: #2a5c45;
      color: #fff;
    }
    .cms-btn-primary:hover { background: #234d3a; }
    .cms-btn-primary:disabled { opacity: 0.5; cursor: not-allowed; }
    .cms-btn-danger {
      background: transparent;
      border: 1px solid #c0392b;
      color: #c0392b;
      font-size: 9px;
      padding: 6px 14px;
    }
    .cms-btn-danger:hover { background: #fdf0ee; }

    /* ── Status bar ── */
    .cms-status {
      padding: 12px 40px;
      font-size: 12px;
      font-family: 'Montserrat', sans-serif;
      display: none;
    }
    .cms-status.success { background: #edf7f1; color: #27763e; display: block; }
    .cms-status.error   { background: #fdf0ee; color: #c0392b; display: block; }
    .cms-status.info    { background: #eef4ff; color: #2855a0; display: block; }

    /* ── Zone fields ── */
    .cms-zones {
      padding: 32px 40px;
      display: flex;
      flex-direction: column;
      gap: 24px;
      max-width: 860px;
    }
    .cms-zone {
      background: #fff;
      border: 1px solid rgba(0,0,0,0.08);
      border-radius: 3px;
      overflow: hidden;
    }
    .cms-zone-label {
      display: flex;
      align-items: center;
      gap: 10px;
      padding: 12px 20px;
      background: #f4f1ec;
      border-bottom: 1px solid rgba(0,0,0,0.06);
    }
    .cms-zone-label span {
      font-size: 10px;
      font-weight: 600;
      letter-spacing: 0.18em;
      text-transform: uppercase;
      color: #666;
    }
    .cms-zone-id {
      font-size: 9px;
      color: #aaa;
      font-family: monospace;
      letter-spacing: 0;
      font-weight: 400;
    }
    .cms-zone input[type="text"],
    .cms-zone textarea {
      width: 100%;
      box-sizing: border-box;
      border: none;
      outline: none;
      padding: 16px 20px;
      font-family: 'Montserrat', sans-serif;
      font-size: 13px;
      color: #1c1c1c;
      background: #fff;
      resize: vertical;
      line-height: 1.7;
      transition: background 0.15s;
    }
    .cms-zone input[type="text"]:focus,
    .cms-zone textarea:focus {
      background: #fffef9;
    }
    .cms-zone textarea { min-height: 96px; }

    /* ── Deploy badge ── */
    .deploy-badge {
      display: inline-flex;
      align-items: center;
      gap: 6px;
      font-size: 10px;
      font-family: 'Montserrat', sans-serif;
      font-weight: 500;
      color: #888;
      padding: 6px 12px;
      background: #f4f1ec;
      border-radius: 2px;
    }
    .deploy-badge .dot {
      width: 6px;
      height: 6px;
      border-radius: 50%;
      background: #ccc;
    }
    .deploy-badge.deploying .dot { background: #f5a623; animation: pulse 1s infinite; }
    .deploy-badge.live .dot { background: #27763e; }
    @keyframes pulse { 0%,100%{opacity:1} 50%{opacity:0.4} }

    /* ── History panel ── */
    .cms-history-panel {
      padding: 32px 40px;
      max-width: 860px;
    }
    .cms-history-panel h3 {
      font-family: 'Gilda Display', serif;
      font-size: 18px;
      margin: 0 0 20px;
    }
    .history-item {
      background: #fff;
      border: 1px solid rgba(0,0,0,0.08);
      border-radius: 3px;
      padding: 16px 20px;
      margin-bottom: 10px;
      display: flex;
      align-items: flex-start;
      gap: 16px;
    }
    .history-meta { flex: 1; }
    .history-msg {
      font-size: 13px;
      color: #1c1c1c;
      margin: 0 0 4px;
      font-family: 'Montserrat', sans-serif;
    }
    .history-detail {
      font-size: 11px;
      color: #999;
      font-family: 'Montserrat', sans-serif;
    }
    .history-sha {
      font-family: monospace;
      font-size: 10px;
      color: #bbb;
      letter-spacing: 0.04em;
    }
    .history-empty {
      font-size: 13px;
      color: #aaa;
      padding: 24px 0;
      text-align: center;
    }

    /* ── Loading skeleton ── */
    .skeleton {
      background: linear-gradient(90deg, #eee 25%, #f5f5f5 50%, #eee 75%);
      background-size: 200% 100%;
      animation: shimmer 1.2s infinite;
      border-radius: 3px;
    }
    @keyframes shimmer { 0%{background-position:200% 0} 100%{background-position:-200% 0} }

    @media (max-width: 700px) {
      .cms-layout { flex-direction: column; }
      .cms-sidebar { width: 100%; padding: 16px 0; border-right: none; border-bottom: 1px solid rgba(255,255,255,0.07); }
      .cms-zones, .cms-history-panel { padding: 20px; }
      .cms-editor-header { padding: 20px; flex-direction: column; align-items: flex-start; gap: 12px; }
    }
  </style>
</head>
<body>

  <!-- ── Admin Nav ──────────────────────────────────────────── -->
  <header>
    <a href="/" class="logo-wrap">
      <span class="logo-main">Coastal</span>
      <span class="logo-script">Travel Company</span>
    </a>
    <div class="header-right">
      <span class="admin-email" id="adminEmail"></span>
      <nav class="admin-nav">
        <a href="pipeline.html" class="admin-nav-link">Pipeline</a>
        <a href="galleries.html" class="admin-nav-link">Galleries</a>
        <a href="clients.html" class="admin-nav-link">Clients</a>
        <a href="services.html" class="admin-nav-link">Services</a>
        <a href="content-editor.html" class="admin-nav-link active">Content</a>
      <a href="analytics.html" class="admin-nav-link">Analytics</a>
        <a href="../portal.html?preview=1" target="_blank" class="admin-nav-link">Customer Portal ↗</a>
      </nav>
      <button class="sign-out-btn" id="btn-logout">Sign Out</button>
    </div>
  </header>

  <!-- ── Layout ─────────────────────────────────────────────── -->
  <div class="cms-layout">

    <!-- Sidebar: page list -->
    <aside class="cms-sidebar">
      <h3>Pages</h3>
      <ul id="page-list">
        <li><a style="opacity:0.4;pointer-events:none;">Loading…</a></li>
      </ul>
    </aside>

    <!-- Main area -->
    <main class="cms-main" id="cms-main">
      <div class="cms-empty" id="cms-empty" style="height:100%;display:flex;">
        <svg width="48" height="48" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5"><path d="M11 4H4a2 2 0 0 0-2 2v14a2 2 0 0 0 2 2h14a2 2 0 0 0 2-2v-7"/><path d="M18.5 2.5a2.121 2.121 0 0 1 3 3L12 15l-4 1 1-4 9.5-9.5z"/></svg>
        <p>Select a page from the sidebar to edit its content.</p>
      </div>

      <!-- Editor (hidden until page selected) -->
      <div id="cms-editor" style="display:none;">
        <div class="cms-editor-header">
          <div>
            <h2 id="page-label"></h2>
            <p class="subtitle" id="page-file"></p>
          </div>
          <div class="cms-actions">
            <span class="deploy-badge" id="deploy-badge">
              <span class="dot"></span>
              <span id="deploy-text">Saved</span>
            </span>
            <button class="cms-btn cms-btn-outline" id="btn-history">History</button>
            <a class="cms-btn cms-btn-outline" id="btn-preview" href="#" target="_blank" rel="noopener">Preview ↗</a>
            <button class="cms-btn cms-btn-primary" id="btn-save" disabled>Save &amp; Publish</button>
          </div>
        </div>

        <div class="cms-status" id="cms-status"></div>
        <div class="cms-zones" id="cms-zones"></div>
      </div>

      <!-- History panel (hidden until triggered) -->
      <div id="cms-history-panel" style="display:none;">
        <div class="cms-editor-header">
          <div>
            <h2>Change History</h2>
            <p class="subtitle" id="history-file-label"></p>
          </div>
          <div class="cms-actions">
            <button class="cms-btn cms-btn-outline" id="btn-back-editor">← Back to Editor</button>
          </div>
        </div>
        <div class="cms-history-panel" id="history-list"></div>
      </div>
    </main>
  </div>

  <script>
    const WORKER = CTC_CONFIG.workerUrl;

    const token = () => localStorage.getItem('ctc_jwt');
    // Mirrors admin-shared.js apiFetch: prefer the HttpOnly auth_token cookie
    // (sent via credentials: 'include'), with a Bearer fallback for browsers
    // that block cross-origin cookies. Sending only a Bearer header (and bailing
    // out to /login.html when localStorage has no JWT) ignores visitors who are
    // authenticated solely via the cookie — which then bounces them through
    // login.html (which *does* see the cookie) straight to /admin/pipeline.html,
    // never landing back on the content editor.
    const headers = () => {
      const h = { 'Content-Type': 'application/json' };
      const t = token();
      if (t) h['Authorization'] = `Bearer ${t}`;
      return h;
    };
    const authedFetch = (url, opts = {}) =>
      fetch(url, { ...opts, headers: { ...headers(), ...(opts.headers || {}) }, credentials: 'include' });

    // ── Auth guard ────────────────────────────────────────────────────────────

    async function checkAuth() {
      try {
        const res = await authedFetch(`${WORKER}/auth/me`);
        if (!res.ok) { location.href = '../login.html?redirect=' + encodeURIComponent(location.pathname); return false; }
        const user = await res.json();
        if (user.role !== 'admin') { location.href = '../portal.html'; return false; }
        document.getElementById('adminEmail').textContent = user.email;
        return true;
      } catch {
        location.href = '../login.html?redirect=' + encodeURIComponent(location.pathname);
        return false;
      }
    }

    document.getElementById('btn-logout').addEventListener('click', () => {
      localStorage.removeItem('ctc_jwt');
      location.href = '../login.html';
    });

    // ── State ─────────────────────────────────────────────────────────────────

    let activePage   = null;   // { file, label }
    let currentZones = [];     // [{id, label, type, value}]
    let isDirty      = false;

    // ── Page list ─────────────────────────────────────────────────────────────

    async function loadPages() {
      const res = await authedFetch(`${WORKER}/admin/cms/pages`);
      if (!res.ok) return;
      const pages = await res.json();

      const list = document.getElementById('page-list');
      list.innerHTML = '';
      for (const p of pages) {
        const li  = document.createElement('li');
        const a   = document.createElement('a');
        a.dataset.file  = p.file;
        a.dataset.label = p.label;
        a.innerHTML = `${p.label}<span class="badge">${p.zoneCount}</span>`;
        a.addEventListener('click', e => { e.preventDefault(); selectPage(p.file, p.label); });
        li.appendChild(a);
        list.appendChild(li);
      }
    }

    // ── Select + load a page ──────────────────────────────────────────────────

    async function selectPage(file, label) {
      if (isDirty && !confirm('You have unsaved changes. Discard and switch page?')) return;

      // Highlight sidebar
      document.querySelectorAll('#page-list a').forEach(a => a.classList.remove('active'));
      const active = document.querySelector(`#page-list a[data-file="${file}"]`);
      if (active) active.classList.add('active');

      activePage = { file, label };
      isDirty    = false;

      // Show editor skeleton
      document.getElementById('cms-empty').style.display         = 'none';
      document.getElementById('cms-history-panel').style.display = 'none';
      document.getElementById('cms-editor').style.display        = 'block';
      document.getElementById('page-label').textContent = label;
      document.getElementById('page-file').textContent  = `site/${file}`;
      document.getElementById('btn-save').disabled = true;
      document.getElementById('btn-preview').href = `../${file}`;

      const zonesEl = document.getElementById('cms-zones');
      zonesEl.innerHTML = '<div class="skeleton" style="height:80px;margin-bottom:16px;"></div>'.repeat(4);
      setStatus('', '');

      // Fetch zones
      try {
        const res = await authedFetch(`${WORKER}/admin/cms/page?file=${file}`);
        if (!res.ok) {
          const err = await res.json().catch(() => ({}));
          return setStatus('error', err.error || 'Failed to load page content.');
        }
        const data = await res.json();
        currentZones = data.zones;
        renderZones(data.zones);
        setDeployBadge('live', 'Saved');
      } catch (e) {
        setStatus('error', `Network error: ${e.message}`);
      }
    }

    // ── Render zone fields ────────────────────────────────────────────────────

    function renderZones(zones) {
      const container = document.getElementById('cms-zones');
      container.innerHTML = '';
      for (const z of zones) {
        const wrap  = document.createElement('div');
        wrap.className = 'cms-zone';

        const lbl = document.createElement('div');
        lbl.className = 'cms-zone-label';
        lbl.innerHTML = `<span>${z.label}</span><span class="cms-zone-id">${z.id}</span>`;

        let input;
        if (z.type === 'multiline') {
          input = document.createElement('textarea');
          input.rows = 3;
        } else {
          input = document.createElement('input');
          input.type = 'text';
        }
        input.value     = z.value;
        input.dataset.zoneId = z.id;
        input.addEventListener('input', onZoneChange);

        wrap.appendChild(lbl);
        wrap.appendChild(input);
        container.appendChild(wrap);
      }
    }

    function onZoneChange() {
      if (!isDirty) {
        isDirty = true;
        document.getElementById('btn-save').disabled = false;
        setDeployBadge('', 'Unsaved changes');
      }
    }

    // ── Save ──────────────────────────────────────────────────────────────────

    document.getElementById('btn-save').addEventListener('click', async () => {
      if (!activePage) return;
      const btn = document.getElementById('btn-save');
      btn.disabled = true;
      btn.textContent = 'Saving…';
      setStatus('info', 'Committing changes to GitHub…');
      setDeployBadge('deploying', 'Deploying…');

      const updates = {};
      document.querySelectorAll('#cms-zones [data-zone-id]').forEach(el => {
        updates[el.dataset.zoneId] = el.value;
      });

      try {
        const res = await authedFetch(`${WORKER}/admin/cms/page?file=${activePage.file}`, {
          method:  'PUT',
          headers: headers(),
          body:    JSON.stringify({ zones: updates }),
        });
        const data = await res.json();
        if (!res.ok) {
          setStatus('error', data.error || 'Save failed.');
          setDeployBadge('', 'Error');
          btn.disabled = false;
          btn.textContent = 'Save & Publish';
          return;
        }
        isDirty = false;
        btn.textContent = 'Save & Publish';
        if (data.message === 'No changes') {
          setStatus('success', 'No changes detected — content is already up to date.');
          setDeployBadge('live', 'Saved');
        } else {
          setStatus('success', `✓ Published: "${data.message}". Changes will be live on the site within ~2 minutes.`);
          setDeployBadge('deploying', 'Deploying…');
          // Switch badge to live after typical Pages deploy time
          setTimeout(() => setDeployBadge('live', 'Live'), 90_000);
        }
      } catch (e) {
        setStatus('error', `Network error: ${e.message}`);
        setDeployBadge('', 'Error');
        btn.disabled = false;
        btn.textContent = 'Save & Publish';
      }
    });

    // ── History ───────────────────────────────────────────────────────────────

    document.getElementById('btn-history').addEventListener('click', showHistory);
    document.getElementById('btn-back-editor').addEventListener('click', () => {
      document.getElementById('cms-history-panel').style.display = 'none';
      document.getElementById('cms-editor').style.display        = 'block';
    });

    async function showHistory() {
      if (!activePage) return;
      document.getElementById('cms-editor').style.display        = 'none';
      document.getElementById('cms-history-panel').style.display = 'block';
      document.getElementById('history-file-label').textContent  = `site/${activePage.file}`;

      const list = document.getElementById('history-list');
      list.innerHTML = '<div class="skeleton" style="height:70px;margin-bottom:10px;"></div>'.repeat(5);

      try {
        const res = await authedFetch(`${WORKER}/admin/cms/history?file=${activePage.file}`);
        if (!res.ok) { list.innerHTML = '<p class="history-empty">Could not load history.</p>'; return; }
        const commits = await res.json();

        list.innerHTML = `<h3>Change History — ${activePage.label}</h3>`;
        if (!commits.length) {
          list.innerHTML += '<p class="history-empty">No commits found for this file.</p>';
          return;
        }

        for (const c of commits) {
          const date = c.date ? new Date(c.date).toLocaleString() : '';
          const item = document.createElement('div');
          item.className = 'history-item';
          item.innerHTML = `
            <div class="history-meta">
              <p class="history-msg">${esc(c.message || '')}</p>
              <p class="history-detail">${esc(c.author || '')} &nbsp;·&nbsp; ${esc(date)}
                &nbsp;<span class="history-sha">${(c.sha || '').slice(0, 7)}</span>
              </p>
            </div>
            <div style="display:flex;gap:8px;align-items:center;">
              <a href="${esc(c.url || '#')}" target="_blank" rel="noopener"
                 style="font-size:10px;color:#888;text-decoration:none;">View ↗</a>
              <button class="cms-btn cms-btn-danger" data-sha="${esc(c.sha)}" onclick="revertTo(this)">Revert</button>
            </div>`;
          list.appendChild(item);
        }
      } catch (e) {
        list.innerHTML = `<p class="history-empty">Error: ${esc(e.message)}</p>`;
      }
    }

    async function revertTo(btn) {
      const sha = btn.dataset.sha;
      if (!activePage || !sha) return;
      if (!confirm(`Revert site/${activePage.file} to commit ${sha.slice(0,7)}? This creates a new commit — no history is lost.`)) return;

      btn.disabled = true;
      btn.textContent = 'Reverting…';

      try {
        const res = await authedFetch(`${WORKER}/admin/cms/revert`, {
          method:  'POST',
          headers: headers(),
          body:    JSON.stringify({ file: activePage.file, sha }),
        });
        const data = await res.json();
        if (!res.ok) { alert(data.error || 'Revert failed.'); btn.disabled = false; btn.textContent = 'Revert'; return; }
        alert(`✓ Reverted: "${data.message}". Changes will be live within ~2 minutes.`);
        document.getElementById('btn-back-editor').click();
        await selectPage(activePage.file, activePage.label);
      } catch (e) {
        alert(`Network error: ${e.message}`);
        btn.disabled = false;
        btn.textContent = 'Revert';
      }
    }

    // ── Helpers ───────────────────────────────────────────────────────────────

    function setStatus(type, msg) {
      const el = document.getElementById('cms-status');
      el.className   = `cms-status${type ? ' ' + type : ''}`;
      el.textContent = msg;
      el.style.display = type ? 'block' : 'none';
    }

    function setDeployBadge(state, text) {
      const badge = document.getElementById('deploy-badge');
      badge.className = `deploy-badge${state ? ' ' + state : ''}`;
      document.getElementById('deploy-text').textContent = text;
    }

    function esc(str) {
      return String(str || '').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
    }

    // ── Init ──────────────────────────────────────────────────────────────────

    (async () => {
      const ok = await checkAuth();
      if (!ok) return;
      await loadPages();
    })();
  </script>
</body>
</html>
