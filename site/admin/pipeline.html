<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Pipeline — Coastal Travel Company Admin</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Gilda+Display&family=Pinyon+Script&family=Montserrat:wght@300;400;500;600&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="admin.css" />
</head>
<body>

<header>
  <div class="logo-wrap">
    <span class="logo-main">Coastal</span>
    <span class="logo-script">Travel Company</span>
  </div>
  <div class="header-right">
    <span class="admin-email" id="adminEmail"></span>
    <nav class="admin-nav">
      <a href="pipeline.html" class="admin-nav-link">Pipeline</a>
      <a href="galleries.html" class="admin-nav-link">Galleries</a>
      <a href="clients.html" class="admin-nav-link">Clients</a>
      <a href="services.html" class="admin-nav-link">Services</a>
    </nav>
    <button class="sign-out-btn" onclick="signOut()">Sign Out</button>
  </div>
</header>

<main class="main">

  <h2 class="sh" id="pipelineHeading">
    Pipeline
    <span class="sh-badge" id="pipelineBadge" style="display:none">0</span>
  </h2>

  <div class="pipeline-toolbar">
    <button class="btn btn-ghost" onclick="toggleNewProjectForm()">+ New Project</button>
  </div>

  <div class="pipeline-new-form" id="newProjectForm">
    <div class="form-grid">
      <div class="fg">
        <label>Client Name</label>
        <input type="text" id="np-clientName" placeholder="Jane Smith" />
      </div>
      <div class="fg">
        <label>Email</label>
        <input type="email" id="np-email" placeholder="client@example.com" />
      </div>
      <div class="fg">
        <label>Property / Venue</label>
        <input type="text" id="np-property" placeholder="The Grand Palms" />
      </div>
      <div class="fg">
        <label>Location</label>
        <input type="text" id="np-location" placeholder="Palm Beach, FL" />
      </div>
      <div class="fg">
        <label>Collection</label>
        <select id="np-collection">
          <option value="">— Select —</option>
          <option>The Editorial Stay</option>
          <option>The Fashioned Weekend</option>
          <option>The Branded Journey</option>
        </select>
      </div>
      <div class="fg">
        <label>Shoot Date</label>
        <input type="date" id="np-shootDate" />
      </div>
      <div class="fg full">
        <label>Message / Notes</label>
        <input type="text" id="np-message" placeholder="Initial notes" />
      </div>
    </div>
    <div style="display:flex; gap:8px; justify-content:flex-end; margin-top:20px;">
      <button class="btn btn-primary btn-sm" onclick="saveNewProject()">Create Project</button>
      <button class="btn btn-ghost btn-sm" onclick="toggleNewProjectForm()">Cancel</button>
    </div>
  </div>

  <div class="pipeline-board" id="pipelineBoard"></div>

  <div class="project-detail" id="projectDetail">
    <div class="pd-header">
      <div>
        <div class="pd-title" id="pd-title"></div>
        <div class="pd-subtitle" id="pd-subtitle"></div>
      </div>
      <button class="pd-close" onclick="closeProjectDetail()">✕</button>
    </div>
    <div class="pd-body">
      <div class="pd-fields">
        <div class="pd-field-grid">
          <div class="fg">
            <label>Stage</label>
            <select id="pd-stage" onchange="saveProjectField('stage', this.value)">
              <option>Inquiry</option>
              <option>Proposal Sent</option>
              <option>Contract Sent</option>
              <option>Contract Signed</option>
              <option>Retainer Paid</option>
              <option>Active</option>
              <option>Delivered</option>
              <option>Complete</option>
            </select>
          </div>
          <div class="fg">
            <label>Shoot Date</label>
            <input type="date" id="pd-shootDate" onchange="saveProjectField('shoot_date', this.value)" />
          </div>
          <div class="fg">
            <label>Client Name</label>
            <input type="text" id="pd-clientName" placeholder="Jane Smith" />
          </div>
          <div class="fg">
            <label>Email</label>
            <input type="email" id="pd-email" placeholder="client@example.com" />
          </div>
          <div class="fg">
            <label>Property</label>
            <input type="text" id="pd-property" placeholder="The Grand Palms" />
          </div>
          <div class="fg">
            <label>Location</label>
            <input type="text" id="pd-location" placeholder="Palm Beach, FL" />
          </div>
          <div class="fg pd-field-full">
            <label>Collection</label>
            <select id="pd-collection">
              <option value="">— Select —</option>
              <option>The Editorial Stay</option>
              <option>The Fashioned Weekend</option>
              <option>The Branded Journey</option>
            </select>
          </div>
          <div class="fg pd-field-full">
            <label>Labels / Tags</label>
            <input type="text" id="pd-labels" placeholder="urgent, waterfront, returning client" />
            <p class="hint">Separate tags with commas. They appear on project cards for quick scanning.</p>
          </div>
        </div>
        <div style="display:flex; gap:8px; margin-top:4px;">
          <button class="btn btn-primary btn-sm" onclick="saveProjectEdits()">Save Changes</button>
          <button class="btn btn-danger btn-sm" onclick="deleteProject()">Delete Project</button>
        </div>
      </div>
      <div class="pd-notes">
        <div class="pd-notes-title">Activity &amp; Notes</div>
        <div class="note-list" id="pd-notes-list"></div>
        <div class="note-add-form">
          <div class="note-type-row">
            <button class="note-type-btn active" onclick="setNoteType('note',this)">Note</button>
            <button class="note-type-btn" onclick="setNoteType('call',this)">Call</button>
            <button class="note-type-btn" onclick="setNoteType('email',this)">Email</button>
            <button class="note-type-btn" onclick="setNoteType('reminder',this)">Reminder</button>
          </div>
          <textarea id="pd-note-input" placeholder="Add a note, call log, or reminder…"></textarea>
          <div class="note-reminder-date" id="pd-reminder-wrap">
            <label>Follow-Up Due Date</label>
            <input type="date" id="pd-note-due" />
          </div>
          <button class="btn btn-ghost btn-sm" style="align-self:flex-end" onclick="addNote()">Add</button>
        </div>
        <div class="pd-documents">
          <div class="pd-notes-title">Documents &amp; Links</div>
          <div class="doc-list" id="pd-doc-list"></div>
          <div class="note-add-form">
            <select id="pd-doc-type">
              <option value="proposal">Proposal</option>
              <option value="contract">Contract</option>
              <option value="invoice">Invoice</option>
              <option value="gallery">Gallery Link</option>
              <option value="other">Other</option>
            </select>
            <input type="text" id="pd-doc-title" placeholder="Document title" />
            <input type="url" id="pd-doc-url" placeholder="https://..." />
            <button class="btn btn-ghost btn-sm" style="align-self:flex-end" onclick="addDocument()">Attach Link</button>
          </div>
        </div>
        <div class="pd-documents">
          <div class="pd-notes-title">Send Proposal</div>
          <div class="doc-list" id="pd-proposal-list"></div>
          <div class="note-add-form">
            <div class="create-gallery-checks" id="pd-proposal-packages"></div>
            <textarea id="pd-proposal-note" placeholder="Personalized cover note"></textarea>
            <label>Expiry Date</label>
            <input type="date" id="pd-proposal-expiry" />
            <button class="btn btn-primary btn-sm" style="align-self:flex-end" onclick="createProposal()">Create Proposal</button>
          </div>
        </div>
      </div>
    </div>
  </div>

</main>

<div class="toast" id="toast"></div>

<script src="../config.js"></script>
<script src="admin-shared.js"></script>
<script>
  const STAGES = [
    'Inquiry', 'Proposal Sent', 'Contract Sent', 'Contract Signed',
    'Retainer Paid', 'Active', 'Delivered', 'Complete',
  ];
  const PIPELINE_SEEN_KEY = 'ctc_pipeline_seen';

  let projects          = [];
  let packages          = [];
  let selectedProjectId = null;
  let noteType          = 'note';
  let dragSrcId         = null;

  // ── Projects ────────────────────────────────────────────────────────────────
  async function loadProjects() {
    const { ok, data } = await apiFetch('/admin/projects', { method: 'GET' });
    if (!ok) return;
    projects = Array.isArray(data) ? data : [];
    renderPipeline();
    updatePipelineBadge();
  }

  function updatePipelineBadge() {
    const seen      = parseInt(localStorage.getItem(PIPELINE_SEEN_KEY) || '0', 10);
    const inquiries = projects.filter(p => p.stage === 'Inquiry').length;
    const unseen    = Math.max(0, inquiries - seen);
    const badge     = document.getElementById('pipelineBadge');
    badge.textContent   = unseen;
    badge.style.display = unseen > 0 ? '' : 'none';
  }

  function markPipelineSeen() {
    const count = projects.filter(p => p.stage === 'Inquiry').length;
    localStorage.setItem(PIPELINE_SEEN_KEY, String(count));
    document.getElementById('pipelineBadge').style.display = 'none';
  }

  function getOutstandingAction(p) {
    const now = Date.now();
    const daysSince = iso => Math.floor((now - new Date(iso)) / 86400000);
    const daysUntil = iso => Math.floor((new Date(iso + 'T00:00:00') - now) / 86400000);

    switch (p.stage) {
      case 'Inquiry': {
        const d = daysSince(p.created_at);
        return { text: d === 0 ? 'New today — respond' : `Respond — ${d}d waiting`, urgent: d >= 3 };
      }
      case 'Proposal Sent': {
        const d = daysSince(p.updated_at);
        if (d >= 7) return { text: `No response — ${d}d`, urgent: true };
        if (d >= 3) return { text: `Follow up — ${d}d`, urgent: false };
        return null;
      }
      case 'Contract Sent': {
        const d = daysSince(p.updated_at);
        if (d >= 2) return { text: `Contract unsigned — ${d}d`, urgent: d >= 5 };
        return null;
      }
      case 'Contract Signed':
        return { text: 'Collect retainer', urgent: false };
      case 'Retainer Paid': {
        if (p.shoot_date) {
          const d = daysUntil(p.shoot_date);
          if (d < 0)  return { text: 'Shoot passed — deliver gallery', urgent: true };
          if (d === 0) return { text: 'Shoot today', urgent: true };
          if (d <= 7)  return { text: `Shoot in ${d}d`, urgent: false };
        }
        return { text: 'Schedule shoot date', urgent: false };
      }
      case 'Active': {
        if (p.shoot_date) {
          const d = daysUntil(p.shoot_date);
          if (d < 0)  return { text: `Deliver gallery — ${Math.abs(d)}d since shoot`, urgent: Math.abs(d) >= 7 };
          if (d === 0) return { text: 'Shoot today', urgent: true };
          return { text: `Shoot in ${d}d`, urgent: false };
        }
        return null;
      }
      case 'Delivered': {
        const d = daysSince(p.updated_at);
        if (d >= 14) return { text: `Follow up — ${d}d since delivery`, urgent: false };
        return null;
      }
      default:
        return null;
    }
  }

  function relTime(iso) {
    if (!iso) return '';
    const m = Math.floor((Date.now() - new Date(iso)) / 60000);
    if (m < 2)  return 'just now';
    if (m < 60) return m + 'm ago';
    const h = Math.floor(m / 60);
    if (h < 24) return h + 'h ago';
    const d = Math.floor(h / 24);
    if (d < 30) return d + 'd ago';
    return Math.floor(d / 30) + 'mo ago';
  }

  function fmtDate(iso) {
    if (!iso) return '';
    return new Date(iso + 'T00:00:00').toLocaleDateString('en-US', { month:'short', day:'numeric', year:'numeric' });
  }

  function projectLabels(p) {
    return String(p.labels || '').split(',').map(t => t.trim()).filter(Boolean);
  }

  // ── Pipeline board ──────────────────────────────────────────────────────────
  function renderPipeline() {
    const board = document.getElementById('pipelineBoard');
    board.innerHTML = STAGES.map(stage => {
      const cards = projects.filter(p => p.stage === stage);
      const colId = 'pcol-' + stage.replace(/ /g, '_');
      return `<div class="pipeline-col" id="${esc(colId)}"
        ondragover="onColDragOver(event)" ondragleave="onColDragLeave(event)"
        ondrop="onColDrop(event,'${esc(stage)}')">
        <div class="pc-col-header">${esc(stage)}<span class="pc-col-count">${cards.length}</span></div>
        ${cards.map(renderCard).join('') || '<div style="color:var(--dim);font-size:11px;padding:6px 0 0;">—</div>'}
      </div>`;
    }).join('');
  }

  function renderCard(p) {
    const parts  = [p.collection, p.property, p.location].filter(Boolean);
    const action = getOutstandingAction(p);
    const labels = projectLabels(p);
    return `<div class="pc-card${p.id === selectedProjectId ? ' selected' : ''}" id="pcard-${esc(p.id)}"
      draggable="true"
      ondragstart="onCardDragStart(event,'${esc(p.id)}')"
      ondragend="onCardDragEnd(event)"
      onclick="selectProject('${esc(p.id)}')">
      <div class="pc-name">${esc(p.client_name)}</div>
      <div class="pc-meta">${parts.length ? esc(parts.join(' · ')) + '<br>' : ''}${p.shoot_date ? esc(fmtDate(p.shoot_date)) + '<br>' : ''}<span style="opacity:.5">${esc(relTime(p.created_at))}</span></div>
      ${labels.length ? `<div class="tag-row">${labels.map(t => `<span class="tag-pill">${esc(t)}</span>`).join('')}</div>` : ''}
      ${action ? `<div class="pc-action${action.urgent ? ' urgent' : ''}">${esc(action.text)}</div>` : ''}
      <span class="pc-source-badge ${esc(p.source)}">${esc(p.source)}</span>
    </div>`;
  }

  // ── Drag and drop ───────────────────────────────────────────────────────────
  function onCardDragStart(e, id) {
    dragSrcId = id;
    e.dataTransfer.effectAllowed = 'move';
    setTimeout(() => document.getElementById('pcard-' + id)?.classList.add('dragging'), 0);
  }
  function onCardDragEnd(e) {
    if (dragSrcId) document.getElementById('pcard-' + dragSrcId)?.classList.remove('dragging');
    dragSrcId = null;
  }
  function onColDragOver(e) {
    e.preventDefault();
    e.dataTransfer.dropEffect = 'move';
    e.currentTarget.classList.add('drag-over');
  }
  function onColDragLeave(e) { e.currentTarget.classList.remove('drag-over'); }
  async function onColDrop(e, stage) {
    e.preventDefault();
    e.currentTarget.classList.remove('drag-over');
    if (!dragSrcId) return;
    const p = projects.find(p => p.id === dragSrcId);
    if (!p || p.stage === stage) return;
    await updateProjectStage(dragSrcId, stage);
  }

  async function updateProjectStage(id, stage) {
    const { ok, data } = await apiFetch('/admin/projects/' + id, { method: 'PUT', body: { stage } });
    if (!ok) { toast('Failed to update stage', true); return; }
    const idx = projects.findIndex(p => p.id === id);
    if (idx >= 0) projects[idx] = data;
    renderPipeline();
    if (selectedProjectId === id) document.getElementById('pd-stage').value = stage;
  }

  // ── New project form ────────────────────────────────────────────────────────
  function toggleNewProjectForm() {
    document.getElementById('newProjectForm').classList.toggle('open');
  }

  async function saveNewProject() {
    const client_name  = document.getElementById('np-clientName').value.trim();
    const client_email = document.getElementById('np-email').value.trim();
    if (!client_name || !client_email) { toast('Client name and email are required', true); return; }
    const body = {
      client_name, client_email,
      property:   document.getElementById('np-property').value.trim(),
      location:   document.getElementById('np-location').value.trim(),
      collection: document.getElementById('np-collection').value,
      shoot_date: document.getElementById('np-shootDate').value,
      message:    document.getElementById('np-message').value.trim(),
      source:     'manual',
    };
    const { ok, data } = await apiFetch('/admin/projects', { method: 'POST', body });
    if (!ok) { toast(data.error || 'Failed to create project', true); return; }
    projects.unshift(data);
    renderPipeline();
    toggleNewProjectForm();
    ['np-clientName','np-email','np-property','np-location','np-message','np-shootDate'].forEach(id => {
      document.getElementById(id).value = '';
    });
    document.getElementById('np-collection').value = '';
    toast('Project created');
  }

  // ── Project detail ──────────────────────────────────────────────────────────
  async function selectProject(id) {
    markPipelineSeen();
    selectedProjectId = id;
    const p = projects.find(p => p.id === id);
    if (!p) return;
    renderPipeline();

    document.getElementById('pd-title').textContent    = p.client_name;
    document.getElementById('pd-subtitle').textContent =
      [p.collection, p.property, p.location].filter(Boolean).join(' · ') || p.client_email || '';
    document.getElementById('pd-stage').value      = p.stage;
    document.getElementById('pd-shootDate').value  = p.shoot_date || '';
    document.getElementById('pd-clientName').value = p.client_name;
    document.getElementById('pd-email').value      = p.client_email;
    document.getElementById('pd-property').value   = p.property || '';
    document.getElementById('pd-location').value   = p.location || '';
    document.getElementById('pd-collection').value = p.collection || '';
    document.getElementById('pd-labels').value     = p.labels || '';

    const detail = document.getElementById('projectDetail');
    detail.classList.add('open');
    detail.scrollIntoView({ behavior: 'smooth', block: 'nearest' });

    renderProposalPackageChecks();
    await Promise.all([loadNotes(id), loadDocuments(id), loadProposals(id)]);
  }

  function closeProjectDetail() {
    selectedProjectId = null;
    document.getElementById('projectDetail').classList.remove('open');
    document.querySelectorAll('.pc-card.selected').forEach(el => el.classList.remove('selected'));
  }

  async function saveProjectEdits() {
    if (!selectedProjectId) return;
    const body = {
      client_name:  document.getElementById('pd-clientName').value.trim(),
      client_email: document.getElementById('pd-email').value.trim(),
      property:     document.getElementById('pd-property').value.trim(),
      location:     document.getElementById('pd-location').value.trim(),
      collection:   document.getElementById('pd-collection').value,
      shoot_date:   document.getElementById('pd-shootDate').value,
      stage:        document.getElementById('pd-stage').value,
      labels:       document.getElementById('pd-labels').value.trim(),
    };
    const { ok, data } = await apiFetch('/admin/projects/' + selectedProjectId, { method: 'PUT', body });
    if (!ok) { toast('Save failed', true); return; }
    const idx = projects.findIndex(p => p.id === selectedProjectId);
    if (idx >= 0) projects[idx] = data;
    renderPipeline();
    document.getElementById('pd-title').textContent    = data.client_name;
    document.getElementById('pd-subtitle').textContent =
      [data.collection, data.property, data.location].filter(Boolean).join(' · ') || data.client_email || '';
    toast('Project updated');
  }

  async function saveProjectField(field, value) {
    if (!selectedProjectId) return;
    const { ok, data } = await apiFetch('/admin/projects/' + selectedProjectId, {
      method: 'PUT', body: { [field]: value },
    });
    if (!ok) { toast('Save failed', true); return; }
    const idx = projects.findIndex(p => p.id === selectedProjectId);
    if (idx >= 0) projects[idx] = data;
    renderPipeline();
  }

  async function deleteProject() {
    if (!selectedProjectId) return;
    if (!confirm('Delete this project? This cannot be undone.')) return;
    const { ok } = await apiFetch('/admin/projects/' + selectedProjectId, { method: 'DELETE' });
    if (!ok) { toast('Delete failed', true); return; }
    projects = projects.filter(p => p.id !== selectedProjectId);
    closeProjectDetail();
    renderPipeline();
    toast('Project deleted');
  }

  // ── Notes ────────────────────────────────────────────────────────────────────
  async function loadNotes(projectId) {
    const { ok, data } = await apiFetch('/admin/projects/' + projectId + '/notes', { method: 'GET' });
    if (!ok) return;
    renderNotes(Array.isArray(data) ? data : []);
  }

  function renderNotes(notes) {
    const el = document.getElementById('pd-notes-list');
    if (!notes.length) {
      el.innerHTML = '<div style="color:var(--dim);font-size:12px;padding:8px 0 12px;">No activity yet.</div>';
      return;
    }
    el.innerHTML = notes.map(n => `
      <div class="note-item">
        <div class="note-type-label">${esc(n.type)}</div>
        <div class="note-content">${esc(n.content)}</div>
        ${n.due_date ? `<div class="note-due${new Date(n.due_date + 'T23:59:59') < new Date() ? ' overdue' : ''}">Due ${esc(fmtDate(n.due_date))}</div>` : ''}
        <div class="note-date">${esc(relTime(n.created_at))}</div>
      </div>`).join('');
  }

  function setNoteType(type, btn) {
    noteType = type;
    document.querySelectorAll('.note-type-btn').forEach(b => b.classList.remove('active'));
    btn.classList.add('active');
    document.getElementById('pd-reminder-wrap').classList.toggle('show', type === 'reminder');
  }

  async function addNote() {
    const content = document.getElementById('pd-note-input').value.trim();
    if (!content || !selectedProjectId) return;
    const due_date = noteType === 'reminder' ? document.getElementById('pd-note-due').value : '';
    const { ok, data } = await apiFetch('/admin/projects/' + selectedProjectId + '/notes', {
      method: 'POST', body: { type: noteType, content, due_date },
    });
    if (!ok) { toast('Failed to add note', true); return; }
    document.getElementById('pd-note-input').value = '';
    document.getElementById('pd-note-due').value = '';
    await loadNotes(selectedProjectId);
    const idx = projects.findIndex(p => p.id === selectedProjectId);
    if (idx >= 0) projects[idx].updated_at = data.created_at;
    toast('Note added');
  }

  // ── Documents ────────────────────────────────────────────────────────────────
  async function loadDocuments(projectId) {
    const { ok, data } = await apiFetch('/admin/projects/' + projectId + '/documents', { method: 'GET' });
    if (!ok) { renderDocuments([]); return; }
    renderDocuments(Array.isArray(data) ? data : []);
  }

  function renderDocuments(docs) {
    const el = document.getElementById('pd-doc-list');
    if (!docs.length) {
      el.innerHTML = '<div style="color:var(--dim);font-size:12px;padding:4px 0 8px;">No documents attached.</div>';
      return;
    }
    el.innerHTML = docs.map(d => `
      <div class="doc-item">
        <div>
          <div class="doc-title">${esc(d.title)}</div>
          <div class="doc-meta">${esc(d.type)} · ${esc(relTime(d.created_at))}</div>
        </div>
        <a class="doc-link" href="${esc(d.url)}" target="_blank" rel="noopener">Open</a>
      </div>`).join('');
  }

  async function addDocument() {
    if (!selectedProjectId) return;
    const body = {
      type:  document.getElementById('pd-doc-type').value,
      title: document.getElementById('pd-doc-title').value.trim(),
      url:   document.getElementById('pd-doc-url').value.trim(),
    };
    if (!body.title || !body.url) { toast('Document title and URL are required', true); return; }
    const { ok } = await apiFetch('/admin/projects/' + selectedProjectId + '/documents', { method: 'POST', body });
    if (!ok) { toast('Failed to attach document', true); return; }
    document.getElementById('pd-doc-title').value = '';
    document.getElementById('pd-doc-url').value = '';
    await loadDocuments(selectedProjectId);
    toast('Document attached');
  }

  // ── Proposals ────────────────────────────────────────────────────────────────
  async function loadProposals(projectId) {
    const { ok, data } = await apiFetch('/admin/projects/' + projectId + '/proposals', { method: 'GET' });
    if (!ok) { renderProposals([]); return; }
    renderProposals(Array.isArray(data) ? data : []);
  }

  function renderProposalPackageChecks() {
    const el = document.getElementById('pd-proposal-packages');
    if (!packages.length) {
      el.innerHTML = '<span style="color:var(--dim); font-size:12px;">Create service packages first.</span>';
      return;
    }
    el.innerHTML = packages.map(pkg => `
      <label class="gallery-check-item">
        <input type="checkbox" name="proposalPackage" value="${esc(pkg.id)}" />
        ${esc(pkg.name)} <span style="color:var(--dim); margin-left:4px;">${pkg.base_price ? '$' + Number(pkg.base_price).toLocaleString('en-US') : 'Custom'}</span>
      </label>`).join('');
  }

  function renderProposals(items) {
    const el = document.getElementById('pd-proposal-list');
    if (!items.length) {
      el.innerHTML = '<div style="color:var(--dim);font-size:12px;padding:4px 0 8px;">No proposals sent yet.</div>';
      return;
    }
    el.innerHTML = items.map(p => `
      <div class="doc-item">
        <div>
          <div class="doc-title">Proposal ${esc(p.status || 'sent')}</div>
          <div class="doc-meta">${Math.round(Number(p.time_spent_seconds || 0) / 60)} min · ${p.opened_at ? 'opened ' + esc(relTime(p.opened_at)) : 'not opened'}</div>
          <div class="doc-meta">${esc(p.expires_at ? 'expires ' + fmtDate(p.expires_at) : 'no expiry')} · ${Number(p.view_count || 0)} views</div>
        </div>
        <a class="doc-link" href="${esc(p.public_url)}" target="_blank" rel="noopener">Open</a>
      </div>`).join('');
  }

  async function createProposal() {
    if (!selectedProjectId) return;
    const selected = [...document.querySelectorAll('input[name="proposalPackage"]:checked')].map(el => el.value);
    if (!selected.length || selected.length > 3) { toast('Select 1 to 3 packages', true); return; }
    const body = {
      package_ids: selected,
      cover_note:  document.getElementById('pd-proposal-note').value.trim(),
      expires_at:  document.getElementById('pd-proposal-expiry').value,
    };
    const { ok, data } = await apiFetch('/admin/projects/' + selectedProjectId + '/proposals', { method: 'POST', body });
    if (!ok) { toast(data.error || 'Failed to create proposal', true); return; }
    document.getElementById('pd-proposal-note').value = '';
    document.getElementById('pd-proposal-expiry').value = '';
    document.querySelectorAll('input[name="proposalPackage"]').forEach(el => { el.checked = false; });
    const idx = projects.findIndex(p => p.id === selectedProjectId);
    if (idx >= 0) {
      projects[idx].stage      = 'Proposal Sent';
      projects[idx].updated_at = data.created_at;
    }
    document.getElementById('pd-stage').value = 'Proposal Sent';
    renderProposals([data]);
    await loadDocuments(selectedProjectId);
    renderPipeline();
    toast('Proposal created');
  }

  // ── Packages (loaded for proposal creation) ──────────────────────────────────
  async function loadPackages() {
    const { ok, data } = await apiFetch('/admin/packages', { method: 'GET' });
    if (!ok) return;
    packages = Array.isArray(data) ? data : [];
    if (selectedProjectId) renderProposalPackageChecks();
  }

  // ── Init ─────────────────────────────────────────────────────────────────────
  async function init() {
    const authed = await authGate();
    if (!authed) return;
    await Promise.all([loadProjects(), loadPackages()]);
  }

  init();
</script>
</body>
</html>
