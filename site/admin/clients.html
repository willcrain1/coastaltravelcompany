<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Clients — Coastal Travel Company Admin</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Gilda+Display&family=Pinyon+Script&family=Montserrat:wght@300;400;500;600&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="admin.css" />
</head>
<body>

<header>
  <a href="/" class="logo-wrap">
    <span class="logo-main">Coastal</span>
    <span class="logo-script">Travel Company</span>
  </a>
  <div class="header-right">
    <span class="admin-email" id="adminEmail"></span>
    <nav class="admin-nav">
      <a href="pipeline.html" class="admin-nav-link">Pipeline</a>
      <a href="galleries.html" class="admin-nav-link">Galleries</a>
      <a href="clients.html" class="admin-nav-link">Clients</a>
      <a href="services.html" class="admin-nav-link">Services</a>
      <a href="../portal.html?preview=1" target="_blank" class="admin-nav-link" style="color:var(--teal);">Customer Portal ↗</a>
    </nav>
    <button class="sign-out-btn" onclick="signOut()">Sign Out</button>
  </div>
</header>

<main class="main">

  <h2 class="sh">Client Accounts</h2>

  <div class="card">
    <form id="createUserForm">
      <div class="form-grid">

        <div class="fg">
          <label>Name</label>
          <input type="text" id="userName" required placeholder="Jane Smith" />
        </div>

        <div class="fg">
          <label>Email</label>
          <input type="email" id="userEmail" required placeholder="client@example.com" />
        </div>

        <div class="fg">
          <label>Role</label>
          <select id="userRole">
            <option value="client">Client</option>
            <option value="admin">Admin</option>
          </select>
        </div>

        <div class="fg full">
          <label>Password (optional — leave blank to allow Google login only)</label>
          <input type="password" id="userPassword" placeholder="Min 8 characters" minlength="8" />
          <p class="hint">If blank, the client must log in with Google. You can set or reset a password later.</p>
        </div>

        <div class="fg full">
          <label>Assign Galleries</label>
          <div class="create-gallery-checks" id="createGalleryChecks">
            <span style="color:var(--dim); font-size:12px;">No galleries yet.</span>
          </div>
          <p class="hint">Check galleries the client can access through their portal. You can change this later.</p>
        </div>

      </div>
      <div style="display:flex; justify-content:flex-end; margin-top:26px;">
        <button type="submit" class="btn btn-primary" id="createUserBtn">Create Account</button>
      </div>
    </form>
  </div>

  <div id="userList"></div>

</main>

<div class="toast" id="toast"></div>

<script src="../config.js"></script>
<script src="admin-shared.js"></script>
<script>
  let users             = [];
  let galleries         = [];
  let currentAdminEmail = '';

  // ── Gallery data (for assignment UI) ────────────────────────────────────────
  async function loadGalleries() {
    const { ok, data } = await apiFetch('/admin/galleries', { method: 'GET' });
    if (!ok) return;
    galleries = Array.isArray(data) ? data : [];
    renderCreateGalleryChecks();
    renderUserList();
  }

  function renderCreateGalleryChecks() {
    const el = document.getElementById('createGalleryChecks');
    if (!galleries.length) {
      el.innerHTML = '<span style="color:var(--dim); font-size:12px;">No galleries yet.</span>';
      return;
    }
    el.innerHTML = galleries.map(g => `
      <label class="gallery-check-item">
        <input type="checkbox" name="createGallery" value="${esc(g.id)}" />
        ${esc(g.eventName)} <span style="color:var(--dim); margin-left:4px;">· ${esc(g.clientName)}</span>
      </label>`).join('');
  }

  function getGallery(id) { return galleries.find(g => g.id === id); }

  // ── User API ─────────────────────────────────────────────────────────────────
  async function loadUsers() {
    const { ok, data } = await apiFetch('/admin/users', { method: 'GET' });
    if (!ok) { toast('Failed to load users', true); return; }
    users = Array.isArray(data) ? data : [];
    renderUserList();
  }

  async function createUser(e) {
    e.preventDefault();
    const btn = document.getElementById('createUserBtn');
    btn.disabled = true; btn.textContent = 'Creating…';

    const name     = document.getElementById('userName').value.trim();
    const email    = document.getElementById('userEmail').value.trim();
    const password = document.getElementById('userPassword').value || undefined;
    const role     = document.getElementById('userRole').value;
    const selected = [...document.querySelectorAll('input[name="createGallery"]:checked')]
      .map(cb => cb.value);

    const { ok, data } = await apiFetch('/admin/users', {
      method: 'POST',
      body:   { name, email, password, role, galleries: selected },
    });

    btn.disabled = false; btn.textContent = 'Create Account';

    if (!ok) { toast(data.error || 'Failed to create user', true); return; }
    users.push(data);
    await loadGalleries();
    e.target.reset();
    toast('Account created');
  }

  document.getElementById('createUserForm').addEventListener('submit', createUser);

  async function sendResetEmail(email) {
    await apiFetch('/auth/reset-request', { method: 'POST', body: { email } });
    toast('Password reset email sent to ' + email);
  }

  async function deleteUser(id) {
    if (!confirm('Delete this user? They will lose access to all galleries.')) return;
    const { ok } = await apiFetch('/admin/users/' + id, { method: 'DELETE' });
    if (!ok) { toast('Delete failed', true); return; }
    users = users.filter(u => u.id !== id);
    await loadGalleries();
    toast('User deleted');
  }

  function toggleUserDetail(id) {
    const panel = document.getElementById('udetail-' + id);
    const chev  = document.getElementById('uchev-' + id);
    if (!panel) return;
    const opening = !panel.classList.contains('open');
    panel.classList.toggle('open');
    if (chev) chev.classList.toggle('open', opening);
  }

  async function saveGalleryAssignment(userId) {
    const panel    = document.getElementById('udetail-' + userId);
    const selected = [...panel.querySelectorAll('input[type=checkbox]:checked')].map(cb => cb.value);
    const { ok, data } = await apiFetch('/admin/users/' + userId, {
      method: 'PUT', body: { galleries: selected },
    });
    if (!ok) { toast(data.error || 'Save failed', true); return; }
    const idx = users.findIndex(u => u.id === userId);
    if (idx >= 0) users[idx] = data;
    panel.classList.remove('open');
    const chev = document.getElementById('uchev-' + userId);
    if (chev) chev.classList.remove('open');
    await loadGalleries();
    toast('Gallery access updated');
  }

  function fmtMemberDate(ts) {
    if (!ts) return '—';
    return new Date(ts).toLocaleDateString('en-US', { month: 'long', year: 'numeric' });
  }

  function renderUserList() {
    const el = document.getElementById('userList');
    if (!users.length) {
      el.innerHTML = '<div class="empty">No client accounts yet — create the first one above.</div>';
      return;
    }
    el.innerHTML = users.map(u => {
      const galleryNames = (u.galleries || [])
        .map(id => { const g = getGallery(id); return g ? esc(g.eventName) : null; })
        .filter(Boolean).join(', ') || '—';

      const galleryChecks = galleries.map(g => `
        <label class="gallery-check-item">
          <input type="checkbox" value="${esc(g.id)}"
            ${(u.galleries || []).includes(g.id) ? 'checked' : ''} />
          ${esc(g.eventName)}
          <span style="color:var(--dim); margin-left:4px;">· ${esc(g.clientName)}</span>
        </label>`).join('');

      const hasPwd    = !!u.hasPassword;
      const hasGoogle = !!u.hasGoogle;
      const authLabel = hasPwd && hasGoogle && u.verified === false ? 'Password (unverified) + Google'
        : hasPwd && u.verified === false ? 'Password (unverified)'
        : hasPwd && hasGoogle ? 'Password + Google'
        : hasPwd              ? 'Password'
        : hasGoogle           ? 'Google Only'
        :                       'No Auth Set';
      const authClass = hasPwd && hasGoogle ? 'auth-both'
        : hasPwd                            ? 'auth-password'
        : hasGoogle                         ? 'auth-google'
        :                                     'auth-none';

      return `
        <div class="user-row">
          <div class="user-header">
            <div class="ur-info" onclick="toggleUserDetail('${esc(u.id)}')">
              <div class="ur-email">
                ${u.name ? esc(u.name) + ' — ' : ''}${esc(u.email)}
                <span class="ur-chevron" id="uchev-${esc(u.id)}">▾</span>
              </div>
              <div class="ur-meta">
                ${u.role === 'admin' ? '<span style="color:var(--teal)">Admin</span>' : 'Client'}
                &nbsp;·&nbsp; ${(u.galleries || []).length} gallery${(u.galleries || []).length !== 1 ? 's' : ''}
                &nbsp;·&nbsp; <span style="color:var(--dim)">${galleryNames}</span>
              </div>
            </div>
            <div class="ur-actions">
              ${u.role === 'client' ? `
                <button class="btn btn-ghost btn-sm" onclick="viewAsClient('${esc(u.id)}')">View as Client</button>` : ''}
              ${u.email !== currentAdminEmail ? `
                <button class="btn btn-ghost btn-sm" onclick="changeRole('${esc(u.id)}','${esc(u.role)}','${esc(u.email)}')">
                  ${u.role === 'admin' ? 'Make Client' : 'Make Admin'}
                </button>` : ''}
              <button class="btn btn-ghost btn-sm" onclick="sendResetEmail('${esc(u.email)}')">Reset Password</button>
              <button class="btn btn-danger btn-sm" onclick="deleteUser('${esc(u.id)}')">Delete</button>
            </div>
          </div>
          <div class="user-detail-panel" id="udetail-${esc(u.id)}">
            <div class="ud-grid">
              <div class="fg">
                <label>Role</label>
                <div class="ud-value">
                  <span class="ud-pill role-${esc(u.role)}">${esc(u.role)}</span>
                </div>
              </div>
              <div class="fg">
                <label>Auth Method</label>
                <div class="ud-value">
                  <span class="ud-pill ${esc(authClass)}">${esc(authLabel)}</span>
                </div>
              </div>
              <div class="fg">
                <label>Verified</label>
                <div class="ud-value">
                  <span class="ud-pill ${u.verified ? 'verified' : 'unverified'}">${u.verified ? 'Verified' : 'Unverified'}</span>
                </div>
              </div>
              <div class="fg">
                <label>Member Since</label>
                <div class="ud-value">${fmtMemberDate(u.created)}</div>
              </div>
            </div>
            <div class="assign-label">Gallery Access</div>
            <div class="gallery-checks">
              ${galleryChecks || '<span style="color:var(--dim); font-size:12px;">No galleries available.</span>'}
            </div>
            <div class="assign-save-row">
              <button class="btn btn-primary btn-sm" onclick="saveGalleryAssignment('${esc(u.id)}')">Save Gallery Access</button>
              <button class="btn btn-ghost btn-sm" onclick="toggleUserDetail('${esc(u.id)}')">Close</button>
            </div>
          </div>
        </div>`;
    }).join('');
  }

  async function changeRole(userId, currentRole, userEmail) {
    const newRole = currentRole === 'admin' ? 'client' : 'admin';
    const msg = newRole === 'admin'
      ? `Promote ${userEmail} to admin? They will gain full admin access to the dashboard.`
      : `Demote ${userEmail} to client? They will lose admin access.`;
    if (!confirm(msg)) return;

    const { ok, data } = await apiFetch('/admin/users/' + userId + '/role', {
      method: 'PATCH',
      body:   { role: newRole },
    });
    if (!ok) { toast(data.error || 'Role change failed', true); return; }

    const idx = users.findIndex(u => u.id === userId);
    if (idx >= 0) users[idx] = data;
    renderUserList();
    toast(`${userEmail} is now ${newRole}`);
  }

  async function viewAsClient(userId) {
    const { ok, data } = await apiFetch('/admin/masquerade', {
      method: 'POST',
      body:   { target_user_id: userId },
    });
    if (!ok) { toast(data.error || 'Failed to start masquerade', true); return; }
    sessionStorage.setItem('ctc_masquerade_token', data.masquerade_token);
    sessionStorage.setItem('ctc_masquerade_user', JSON.stringify(data.target_user));
    window.location.href = '/portal.html?masquerade=1';
  }

  // ── Init ─────────────────────────────────────────────────────────────────────
  async function changeRole(userId, currentRole, userEmail) {
    const newRole = currentRole === 'admin' ? 'client' : 'admin';
    const msg = newRole === 'admin'
      ? `Promote ${userEmail} to admin? They will gain full admin access to the dashboard.`
      : `Demote ${userEmail} to client? They will lose admin access.`;
    if (!confirm(msg)) return;

    const { ok, data } = await apiFetch('/admin/users/' + userId + '/role', {
      method: 'PATCH',
      body:   { role: newRole },
    });
    if (!ok) { toast(data.error || 'Role change failed', true); return; }

    const idx = users.findIndex(u => u.id === userId);
    if (idx >= 0) users[idx] = data;
    renderUserList();
    toast(`${userEmail} is now ${newRole}`);
  }

  async function init() {
    const authed = await authGate();
    if (!authed) return;
    currentAdminEmail = document.getElementById('adminEmail').textContent.trim();
    await Promise.all([loadGalleries(), loadUsers()]);
  }

  init();
</script>
</body>
</html>
