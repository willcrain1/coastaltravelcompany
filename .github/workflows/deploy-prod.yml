name: Deploy Prod

on:
  push:
    branches: [master]
  workflow_dispatch:

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  deploy-worker:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5

      - uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Deploy prod Worker
        env:
          CF_ACCOUNT_ID: ${{ secrets.CF_ACCOUNT_ID }}
          CF_API_TOKEN: ${{ secrets.CF_API_TOKEN }}
          CF_WORKER_NAME: ${{ secrets.CF_WORKER_NAME }}
        run: |
          chmod +x ./worker/deploy-worker.sh
          ./worker/deploy-worker.sh

      - name: Run D1 migrations (prod)
        env:
          CF_ACCOUNT_ID: ${{ secrets.CF_ACCOUNT_ID }}
          CF_API_TOKEN: ${{ secrets.CF_API_TOKEN }}
        run: |
          cd worker
          export CLOUDFLARE_ACCOUNT_ID="$CF_ACCOUNT_ID"
          export CLOUDFLARE_API_TOKEN="$CF_API_TOKEN"
          for f in migrations/*.sql; do
            echo "Applying $f..."
            npx wrangler d1 execute CTC_PROJECTS --file "$f"
          done

  deploy-site:
    needs: deploy-worker
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5

      - uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Deploy site to Cloudflare Pages
        env:
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CF_ACCOUNT_ID }}
          CLOUDFLARE_API_TOKEN: ${{ secrets.CF_API_TOKEN }}
        run: |
          cd worker
          npm install
          npx wrangler pages deploy ../site \
            --project-name coastaltravelcompany-prod \
            --branch master \
            --commit-dirty=true

  acceptance-tests:
    needs: deploy-site
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@v5

      - uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install dependencies
        run: npm install

      - name: Install Playwright browsers
        run: npx playwright install --with-deps chromium

      - name: Run acceptance tests
        env:
          BASE_URL: https://coastaltravelcompany.com
          WORKER_URL: https://coastal-gallery-proxy.thecoastaltravelcompany.workers.dev
        run: npm test

      - name: Upload test report on failure
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-report
          path: |
            playwright-report/
            test-results/
          retention-days: 7
