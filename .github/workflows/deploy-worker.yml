name: Deploy Worker

on:
  push:
    branches: [master]
  workflow_dispatch:

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  deploy-worker:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
        with:
          fetch-depth: 2

      - uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Deploy Worker if changed
        env:
          CF_ACCOUNT_ID: ${{ secrets.CF_ACCOUNT_ID }}
          CF_API_TOKEN: ${{ secrets.CF_API_TOKEN }}
          CF_WORKER_NAME: ${{ secrets.CF_WORKER_NAME }}
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ] || \
             git diff --name-only HEAD~1 HEAD | grep -qE "^worker/(cloudflare-worker\.js|package\.json|migrations/)"; then
            ./worker/deploy-worker.sh
          else
            echo "worker unchanged — skipping Worker deploy"
          fi

      - name: Run D1 migrations if changed
        env:
          CF_ACCOUNT_ID: ${{ secrets.CF_ACCOUNT_ID }}
          CF_API_TOKEN: ${{ secrets.CF_API_TOKEN }}
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ] || \
             git diff --name-only HEAD~1 HEAD | grep -qE "^worker/migrations/"; then
            cd worker
            export CLOUDFLARE_ACCOUNT_ID="$CF_ACCOUNT_ID"
            export CLOUDFLARE_API_TOKEN="$CF_API_TOKEN"
            for f in migrations/*.sql; do
              echo "Applying $f..."
              npx wrangler d1 execute CTC_PROJECTS --file "$f"
            done
          else
            echo "no migration changes — skipping D1 migrations"
          fi
