name: Deploy Preprod

on:
  push:
    branches: [preprod]
  workflow_dispatch:

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  deploy-worker-preprod:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5

      - uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Deploy preprod Worker
        env:
          CF_ACCOUNT_ID: ${{ secrets.CF_ACCOUNT_ID }}
          CF_API_TOKEN: ${{ secrets.CF_API_TOKEN }}
          CF_WORKER_NAME: ${{ secrets.CF_WORKER_NAME }}
          CF_WORKER_NAME_PREPROD: ${{ secrets.CF_WORKER_NAME_PREPROD }}
        run: |
          chmod +x ./worker/deploy-worker-preprod.sh
          ./worker/deploy-worker-preprod.sh

  # Preprod static site is served by Cloudflare Pages, connected directly to
  # the preprod branch in the Cloudflare dashboard — no GitHub Pages step needed.
