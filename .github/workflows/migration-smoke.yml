name: Migration Smoke Tests
on:
  pull_request:
    paths: ['worker/migrations/**', 'worker/tests/migration-smoke.test.js']
  push:
    branches: [preprod, master]
    paths: ['worker/migrations/**']
jobs:
  smoke:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
      - uses: actions/setup-node@v4
        with: { node-version: '20' }
      - run: npm install
        working-directory: worker
      - run: npx vitest run tests/migration-smoke.test.js
        working-directory: worker
