name: Worker Unit Tests
on:
  pull_request:
  push:
    branches: [preprod, master]
jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
      - uses: actions/setup-node@v4
        with: { node-version: '20' }
      - run: npm install
        working-directory: worker
      - run: npm run test:unit
        working-directory: worker
